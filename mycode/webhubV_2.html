<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <!-- ป้องกันการซูมและการกดสองครั้งในมือถือ -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tonkla's Code Space</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { primary: { DEFAULT: '#16a34a' } },
                    screens: { 'xs': '375px' }
                }
            }
        }
    </script>
    
    <!-- Icons & Fonts -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&family=Mitr:wght@400;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    
    <style>
        /* ตั้งค่าพื้นฐานสำหรับมือถือ */
        body { 
            font-family: 'Sarabun', sans-serif; 
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            overscroll-behavior-y: none;
        }
        h1, h2, h3, .brand-font { font-family: 'Mitr', sans-serif; }
        
        .code-font { font-family: 'JetBrains Mono', 'Courier New', monospace; }
        
        .page-section { display: none; width: 100%; height: 100%; }
        .page-section.active { display: flex; flex-direction: column; }
        
        .dark ::-webkit-scrollbar { width: 6px; }
        .dark ::-webkit-scrollbar-track { background: #0f172a; }
        .dark ::-webkit-scrollbar-thumb { background: #166534; border-radius: 4px; }
        
        /* Checkbox Custom Style */
        .todo-checkbox:checked + div { text-decoration: line-through; color: #9ca3af; }
        
        /* Transitions for Home Slider */
        .slide-card { transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="bg-green-50 text-gray-800 dark:bg-gray-900 dark:text-gray-100 h-[100dvh] w-screen flex flex-col overflow-hidden transition-colors duration-300">

    <!-- Navbar -->
    <nav id="mainNavbar" class="bg-green-600 dark:bg-green-900 text-white shadow-lg z-50 shrink-0 h-16 md:h-20 flex items-center justify-between px-4 md:px-8 transition-all duration-300">
        <div class="flex items-center cursor-pointer select-none" onclick="window.showPage('home')">
            <i class="fas fa-code-branch fa-lg md:text-2xl mr-2 text-green-200"></i>
            <span class="font-bold text-lg xs:text-xl md:text-2xl brand-font">Tonkla's Space</span>
        </div>
        <div class="flex space-x-1 md:space-x-4">
            <button type="button" onclick="window.showPage('create')" class="p-2 md:px-4 md:py-2 rounded-full hover:bg-green-500 active:scale-95 transition flex items-center">
                <i class="fas fa-pen md:text-lg"></i> <span class="hidden sm:inline ml-1 md:ml-2 md:text-lg">เขียน</span>
            </button>
            <button type="button" onclick="window.loadList()" class="p-2 md:px-4 md:py-2 rounded-full hover:bg-green-500 active:scale-95 transition flex items-center">
                <i class="fas fa-folder md:text-lg"></i> <span class="hidden sm:inline ml-1 md:ml-2 md:text-lg">งาน</span>
            </button>
            <button type="button" onclick="window.toggleConfig()" class="p-2 md:p-3 rounded-full hover:bg-green-500 active:scale-95 transition">
                <i class="fas fa-cog md:text-xl"></i>
            </button>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-1 relative w-full overflow-hidden z-0">
        
        <!-- 1. HOME (Slider System) -->
        <div id="page-home" class="page-section active bg-white/50 dark:bg-gray-800/50 backdrop-blur-sm overflow-hidden">
            <div class="w-full h-full flex items-center justify-center relative">
                
                <!-- Navigation Buttons (Floating) -->
                <div class="absolute inset-x-0 top-1/2 -translate-y-1/2 flex justify-between px-2 md:px-8 w-full max-w-5xl mx-auto z-20 pointer-events-none">
                    <!-- Left Arrow -->
                    <button id="home-prev-btn" onclick="window.slideHome('prev')" class="pointer-events-auto bg-white dark:bg-gray-800 text-green-600 dark:text-green-400 p-3 md:p-4 rounded-full shadow-xl hover:scale-110 transition opacity-0 -translate-x-10" disabled>
                        <i class="fas fa-chevron-left text-xl md:text-2xl"></i>
                    </button>
                    <!-- Right Arrow -->
                    <button id="home-next-btn" onclick="window.slideHome('next')" class="pointer-events-auto bg-white dark:bg-gray-800 text-green-600 dark:text-green-400 p-3 md:p-4 rounded-full shadow-xl hover:scale-110 transition animate-pulse">
                        <i class="fas fa-chevron-right text-xl md:text-2xl"></i>
                    </button>
                </div>

                <!-- Cards Container -->
                <div class="relative w-full max-w-sm md:max-w-2xl h-auto aspect-[4/5] md:aspect-video flex items-center justify-center">
                    
                    <!-- Card 1: Code Space -->
                    <div id="card-code-space" class="slide-card absolute inset-0 p-6 flex flex-col items-center justify-center transform translate-x-0 opacity-100 z-10">
                        <div class="bg-white dark:bg-gray-800 p-8 md:p-12 rounded-3xl shadow-2xl w-full border border-green-100 dark:border-green-800 text-center h-full flex flex-col justify-center">
                            <i class="fas fa-laptop-code text-6xl md:text-8xl text-green-500 mb-6 inline-block animate-bounce"></i>
                            <h1 class="text-2xl md:text-4xl font-bold mb-2 brand-font">Tonkla's Code Space</h1>
                            <p class="text-gray-600 dark:text-gray-400 mb-8 text-sm md:text-lg">พื้นที่เก็บโค้ดส่วนตัวของคุณต้นกล้า</p>
                            <div class="flex flex-col md:flex-row gap-3 md:gap-6 justify-center">
                                <button type="button" onclick="window.startNewCode()" class="w-full md:w-auto md:px-10 bg-green-600 text-white font-bold py-3 md:py-4 rounded-xl shadow active:scale-95 transition md:text-lg">
                                    <i class="fas fa-plus mr-2"></i> สร้างงานใหม่
                                </button>
                                <button type="button" onclick="window.loadList()" class="w-full md:w-auto md:px-10 bg-white text-green-600 border border-green-600 font-bold py-3 md:py-4 rounded-xl shadow active:scale-95 transition md:text-lg">
                                    <i class="fas fa-folder-open mr-2"></i> ดูงานเก่า
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- Card 2: To Do List -->
                    <div id="card-todo-list" class="slide-card absolute inset-0 p-6 flex flex-col items-center justify-center transform translate-x-full opacity-0 pointer-events-none z-0">
                        <div class="bg-white dark:bg-gray-800 p-6 md:p-8 rounded-3xl shadow-2xl w-full border border-blue-100 dark:border-blue-900 h-full flex flex-col">
                            <div class="text-center mb-4">
                                <i class="fas fa-clipboard-list text-5xl md:text-6xl text-blue-500 mb-4 inline-block"></i>
                                <h1 class="text-2xl md:text-3xl font-bold brand-font text-gray-800 dark:text-white">Tonkla's To Do List</h1>
                                <p class="text-gray-500 dark:text-gray-400 text-sm">รายการสิ่งที่ต้องทำ</p>
                            </div>
                            
                            <!-- Input Area -->
                            <div class="flex gap-2 mb-4">
                                <input type="text" id="todoInput" placeholder="เพิ่มงานใหม่..." class="flex-1 bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 dark:text-white" onkeypress="if(event.key === 'Enter') window.addTodo()">
                                <button onclick="window.addTodo()" class="bg-blue-600 hover:bg-blue-700 text-white p-2 rounded-lg w-12 transition"><i class="fas fa-plus"></i></button>
                            </div>

                            <!-- List Area -->
                            <div id="todoContainer" class="flex-1 overflow-y-auto space-y-2 pr-1">
                                <!-- Todo Items will be here -->
                                <div class="text-center text-gray-400 mt-10">ไม่มีงานค้าง สบายจัง!</div>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </div>

        <!-- 2. CREATE -->
        <div id="page-create" class="page-section bg-white dark:bg-gray-900">
            <div class="bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 h-14 md:h-16 flex items-center justify-between px-3 md:px-6 shrink-0 transition-all gap-2">
                <button type="button" onclick="window.showPage('home')" class="text-gray-500 p-2 md:p-3 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-full transition"><i class="fas fa-arrow-left md:text-lg"></i></button>
                <input type="text" id="codeTitle" placeholder="ตั้งชื่อผลงาน..." class="flex-1 bg-transparent border-b border-transparent hover:border-gray-300 focus:border-green-500 text-gray-700 dark:text-gray-200 text-center font-bold text-sm md:text-xl focus:outline-none transition-colors px-2 py-1 placeholder-gray-400" autocomplete="off">
                <button type="button" onclick="window.insertTemplate()" class="text-xs md:text-base bg-green-100 text-green-700 px-3 py-1.5 rounded-lg hover:bg-green-200 transition font-bold">Template</button>
            </div>

            <div class="flex-1 flex flex-col md:flex-row overflow-hidden">
                <div class="w-full md:w-1/2 h-1/2 md:h-full flex flex-col border-b md:border-b-0 md:border-r border-gray-200 dark:border-gray-700 relative">
                    <div class="flex-1 flex relative overflow-hidden bg-gray-50 dark:bg-[#0d1117]">
                        <div id="lineNumbers" class="w-10 md:w-12 pt-4 md:pt-6 pb-20 px-1 bg-gray-100 dark:bg-gray-800 text-gray-400 dark:text-gray-500 text-sm md:text-base overflow-hidden border-r border-gray-300 dark:border-gray-700 font-mono text-right select-none">1</div>
                        <textarea id="codeEditor" class="flex-1 p-4 md:p-6 pb-20 w-full h-full resize-none code-font text-sm md:text-base text-gray-800 dark:text-green-400 focus:outline-none whitespace-pre overflow-auto grid-background" placeholder="<!-- เขียนโค้ดที่นี่ -->" spellcheck="false"></textarea>
                        <div id="lineCountSummary" class="absolute bottom-4 right-4 bg-white/90 dark:bg-gray-800/90 text-gray-500 dark:text-gray-400 text-xs px-3 py-1 rounded-full shadow-md border border-gray-200 dark:border-gray-700 select-none pointer-events-none backdrop-blur-sm z-10">1 บรรทัด</div>
                    </div>
                </div>
                <div id="previewContainer" class="w-full md:w-1/2 h-1/2 md:h-full flex flex-col bg-white dark:bg-black">
                    <div class="h-8 md:h-12 bg-gray-100 dark:bg-gray-800 flex items-center justify-between px-3 md:px-6 border-b border-gray-200 dark:border-gray-700 shrink-0">
                        <span class="text-[10px] md:text-sm font-bold uppercase text-gray-500 tracking-wider">Preview</span>
                        <div class="flex items-center gap-2">
                            <button onclick="window.togglePreviewFullScreen()" class="text-gray-500 hover:text-green-600 transition p-1" title="ดูผลลัพธ์เต็มจอ"><i class="fas fa-expand text-xs md:text-base"></i></button>
                            <button onclick="window.updatePreview()" class="text-gray-500 hover:text-green-600 transition p-1" title="รีเฟรช"><i class="fas fa-sync-alt text-xs md:text-base"></i></button>
                        </div>
                    </div>
                    <iframe id="previewFrame" class="flex-1 w-full h-full border-none bg-white"></iframe>
                </div>
            </div>

            <div class="bg-white dark:bg-gray-800 border-t border-gray-200 dark:border-gray-700 p-3 md:p-5 flex justify-between items-center shadow-lg shrink-0 z-20">
                <div class="text-xs md:text-base text-gray-400 flex items-center"><div class="w-2 h-2 md:w-3 md:h-3 rounded-full bg-green-500 mr-2"></div> <span id="statusMsg">พร้อม</span></div>
                <button type="button" onclick="window.saveCode()" id="saveBtn" class="bg-green-600 hover:bg-green-700 text-white font-bold py-2 md:py-3 px-6 md:px-10 rounded-lg shadow active:scale-95 transition w-32 md:w-auto md:min-w-[150px] md:text-lg">บันทึก</button>
            </div>
        </div>

        <!-- 3. LIST -->
        <div id="page-list" class="page-section bg-gray-50 dark:bg-gray-900 overflow-y-auto">
            <div class="max-w-4xl mx-auto p-4 md:p-8 pb-20">
                <div class="flex items-center mb-4 md:mb-8">
                    <button type="button" onclick="window.showPage('home')" class="mr-3 md:mr-5 bg-white dark:bg-gray-800 p-2 md:p-3 rounded-full shadow hover:scale-105 transition"><i class="fas fa-arrow-left md:text-xl"></i></button>
                    <h2 class="text-xl md:text-3xl font-bold brand-font">รายการงาน</h2>
                </div>
                <div id="listContainer" class="grid gap-3 md:gap-5">
                    <div class="text-center py-10 text-gray-400 col-span-full"><i class="fas fa-circle-notch fa-spin text-2xl md:text-4xl"></i><br>กำลังโหลด...</div>
                </div>
            </div>
        </div>

        <!-- 4. VIEW (Full Screen) -->
        <div id="page-view" class="page-section bg-white w-full h-full relative">
            <iframe id="fullViewFrame" class="w-full h-full border-none block"></iframe>
            <div id="viewLoading" class="absolute inset-0 bg-white flex items-center justify-center z-20 hidden">
                <i class="fas fa-seedling fa-spin text-4xl md:text-6xl text-green-500"></i>
            </div>
            <div class="absolute bottom-6 right-6 flex gap-3 z-30">
                <button onclick="window.shareCurrentView()" class="bg-purple-600 hover:bg-purple-700 text-white p-4 rounded-full shadow-xl transition transform active:scale-90 flex items-center justify-center w-14 h-14" title="แชร์หน้านี้">
                    <i class="fas fa-share-alt text-xl"></i>
                </button>
                <button id="viewBackButton" onclick="window.goBackToList()" class="bg-gray-800 hover:bg-gray-900 text-white p-4 rounded-full shadow-xl transition transform active:scale-90 flex items-center justify-center w-14 h-14" title="กลับหน้ารายการ">
                    <i class="fas fa-arrow-left text-xl"></i>
                </button>
            </div>
        </div>

    </main>

    <!-- Config Modal -->
    <div id="configModal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-[60] flex items-center justify-center p-4" onclick="if(event.target === this) window.toggleConfig()">
        <div class="bg-white dark:bg-gray-800 w-full max-w-xs rounded-2xl p-5 shadow-2xl">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-bold text-lg brand-font">ตั้งค่า</h3>
                <button onclick="window.toggleConfig()" class="text-gray-400 p-2"><i class="fas fa-times"></i></button>
            </div>
            <div class="space-y-4">
                <div class="flex justify-between items-center">
                    <span class="text-sm"><i class="fas fa-moon mr-2 text-green-600"></i>โหมดมืด</span>
                    <input type="checkbox" id="darkModeToggle" class="accent-green-600 w-5 h-5" onchange="window.toggleDarkMode()">
                </div>
                <div class="bg-gray-50 dark:bg-gray-700/50 p-3 rounded-lg">
                    <div onclick="document.getElementById('apiSettings').classList.toggle('hidden')" class="text-xs text-center text-gray-500 underline cursor-pointer pb-1">ตั้งค่า API (แตะเพื่อเปิด)</div>
                    <div id="apiSettings" class="hidden space-y-2 mt-2">
                        <input type="text" id="apiUrlInput" placeholder="Web App URL" class="w-full text-xs p-2 border rounded dark:bg-gray-800 dark:border-gray-600">
                        <input type="password" id="apiPassInput" placeholder="Password" class="w-full text-xs p-2 border rounded dark:bg-gray-800 dark:border-gray-600">
                    </div>
                </div>
                <button onclick="window.saveConfig()" class="w-full bg-green-600 text-white font-bold py-2 rounded-lg shadow active:scale-95 transition">บันทึก</button>
            </div>
            <div class="mt-6 pt-4 border-t border-gray-100 dark:border-gray-700 text-center">
                <p class="text-xs text-gray-400 dark:text-gray-500">
                    Developed by<br>
                    <span class="font-semibold text-gray-600 dark:text-gray-300">Sarayut Angko</span><br>
                    Nongphai School
                </p>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="hidden fixed top-20 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-full shadow-2xl z-[70] text-sm font-bold whitespace-nowrap">
        <span id="toastMsg">Notification</span>
    </div>

    <audio id="bgMusic" loop>
        <source src="https://actions.google.com/sounds/v1/ambiences/forest_morning.ogg" type="audio/ogg">
    </audio>

    <script>
        window.currentEditingId = null;
        window.currentViewId = null;
        
        // --- HOME SLIDER LOGIC ---
        window.slideHome = function(direction) {
            const cardCode = document.getElementById('card-code-space');
            const cardTodo = document.getElementById('card-todo-list');
            const btnPrev = document.getElementById('home-prev-btn');
            const btnNext = document.getElementById('home-next-btn');

            if (direction === 'next') {
                // Show Todo, Hide Code
                cardCode.classList.remove('translate-x-0', 'opacity-100', 'z-10');
                cardCode.classList.add('-translate-x-full', 'opacity-0', 'pointer-events-none', 'z-0');
                
                cardTodo.classList.remove('translate-x-full', 'opacity-0', 'pointer-events-none', 'z-0');
                cardTodo.classList.add('translate-x-0', 'opacity-100', 'z-10');

                // Button State
                btnNext.classList.add('opacity-0', '-translate-x-10', 'pointer-events-none');
                btnPrev.classList.remove('opacity-0', '-translate-x-10', 'pointer-events-none');
                btnPrev.disabled = false;
                btnNext.disabled = true;
            } else {
                // Show Code, Hide Todo
                cardCode.classList.remove('-translate-x-full', 'opacity-0', 'pointer-events-none', 'z-0');
                cardCode.classList.add('translate-x-0', 'opacity-100', 'z-10');
                
                cardTodo.classList.remove('translate-x-0', 'opacity-100', 'z-10');
                cardTodo.classList.add('translate-x-full', 'opacity-0', 'pointer-events-none', 'z-0');

                // Button State
                btnPrev.classList.add('opacity-0', '-translate-x-10', 'pointer-events-none');
                btnNext.classList.remove('opacity-0', '-translate-x-10', 'pointer-events-none');
                btnNext.disabled = false;
                btnPrev.disabled = true;
            }
        }

        // --- TODO LIST LOGIC ---
        window.todos = JSON.parse(localStorage.getItem('tonkla_todos')) || [];

        window.renderTodos = function() {
            const container = document.getElementById('todoContainer');
            if (window.todos.length === 0) {
                container.innerHTML = '<div class="text-center text-gray-400 mt-10">ไม่มีงานค้าง สบายจัง!</div>';
                return;
            }
            
            let html = '';
            window.todos.forEach((todo, index) => {
                html += `
                    <div class="flex items-center justify-between bg-gray-50 dark:bg-gray-700/50 p-3 rounded-lg group animate-fade-in-up">
                        <label class="flex items-center gap-3 cursor-pointer flex-1">
                            <input type="checkbox" class="todo-checkbox w-5 h-5 accent-blue-500 rounded cursor-pointer" ${todo.done ? 'checked' : ''} onchange="window.toggleTodo(${index})">
                            <div class="${todo.done ? 'text-gray-400 line-through' : 'text-gray-800 dark:text-gray-200'} transition-all">${todo.text}</div>
                        </label>
                        <button onclick="window.deleteTodo(${index})" class="text-gray-400 hover:text-red-500 p-1 opacity-0 group-hover:opacity-100 transition"><i class="fas fa-trash"></i></button>
                    </div>`;
            });
            container.innerHTML = html;
        }

        window.addTodo = function() {
            const input = document.getElementById('todoInput');
            const text = input.value.trim();
            if (text) {
                window.todos.unshift({ text: text, done: false });
                localStorage.setItem('tonkla_todos', JSON.stringify(window.todos));
                input.value = '';
                window.renderTodos();
            }
        }

        window.toggleTodo = function(index) {
            window.todos[index].done = !window.todos[index].done;
            localStorage.setItem('tonkla_todos', JSON.stringify(window.todos));
            window.renderTodos();
        }

        window.deleteTodo = function(index) {
            window.todos.splice(index, 1);
            localStorage.setItem('tonkla_todos', JSON.stringify(window.todos));
            window.renderTodos();
        }

        // --- NAVIGATION ---
        window.showPage = function(pageId) {
            document.querySelectorAll('.page-section').forEach(el => el.classList.remove('active'));
            const target = document.getElementById('page-' + pageId);
            if(target) target.classList.add('active');
            
            const navbar = document.getElementById('mainNavbar');
            if (pageId === 'view') navbar.classList.add('hidden');
            else navbar.classList.remove('hidden');
            
            if (pageId !== 'view' && pageId !== 'list') {
                try { history.pushState("", document.title, window.location.pathname); } catch(e){}
            }
        }

        window.goBackToList = function() {
            window.showPage('list');
            window.loadList();
        }

        window.toggleConfig = function() { document.getElementById('configModal').classList.toggle('hidden'); }

        window.initTheme = function() {
            try {
                const isDark = localStorage.getItem('tonkla_theme') === 'dark';
                if(isDark) document.documentElement.classList.add('dark');
                document.getElementById('darkModeToggle').checked = isDark;
                
                const urlParams = new URLSearchParams(window.location.search);
                const apiParam = urlParams.get('api');
                
                if(apiParam) {
                    try {
                        const decodedApi = atob(apiParam);
                        if(decodedApi.startsWith('http')) {
                            localStorage.setItem('codeKeeper_url', decodedApi);
                        }
                    } catch(e) {}
                }

                document.getElementById('apiUrlInput').value = localStorage.getItem('codeKeeper_url') || '';
                document.getElementById('apiPassInput').value = localStorage.getItem('codeKeeper_pass') || '';
            } catch(e){}
        }

        window.toggleDarkMode = function() {
            const isDark = document.getElementById('darkModeToggle').checked;
            if(isDark) document.documentElement.classList.add('dark');
            else document.documentElement.classList.remove('dark');
            localStorage.setItem('tonkla_theme', isDark ? 'dark' : 'light');
        }

        window.saveConfig = function() {
            localStorage.setItem('codeKeeper_url', document.getElementById('apiUrlInput').value.trim());
            localStorage.setItem('codeKeeper_pass', document.getElementById('apiPassInput').value.trim());
            window.toggleConfig();
            window.showToast('บันทึกการตั้งค่าแล้ว ✅');
        }

        window.startNewCode = function() {
            window.currentEditingId = null;
            document.getElementById('saveBtn').innerText = "บันทึก";
            document.getElementById('codeEditor').value = '';
            document.getElementById('codeTitle').value = '';
            window.updateLineNumbers();
            window.updatePreview();
            window.showPage('create');
        }

        const editor = document.getElementById('codeEditor');
        const lineNumbers = document.getElementById('lineNumbers');
        const lineCountSummary = document.getElementById('lineCountSummary');
        const previewFrame = document.getElementById('previewFrame');
        
        window.updateLineNumbers = function() {
            const text = editor.value;
            const lines = text.split('\n').length;
            lineNumbers.innerHTML = Array(lines).fill(0).map((_, i) => i + 1).join('<br>');
            lineCountSummary.innerText = `${lines} บรรทัด`;
        };

        editor.addEventListener('scroll', () => { lineNumbers.scrollTop = editor.scrollTop; });
        editor.addEventListener('input', () => {
            window.updateLineNumbers();
            clearTimeout(window.previewTimeout);
            window.previewTimeout = setTimeout(window.updatePreview, 800);
        });

        window.updatePreview = function() {
            const content = editor.value;
            const blob = new Blob([content], {type: 'text/html'});
            const url = URL.createObjectURL(blob);
            previewFrame.src = url;
        }

        window.insertTemplate = function() {
            if(editor.value && !confirm('ทับโค้ดเดิมไหม?')) return;
            editor.value = `<!DOCTYPE html>\n<html>\n<head>\n<style>\n  body { font-family: sans-serif; padding: 20px; text-align: center; }\n  h1 { color: #16a34a; }\n</style>\n</head>\n<body>\n  <h1>สวัสดีต้นกล้า!</h1>\n  <p>เขียนโค้ดที่นี่...</p>\n</body>\n</html>`;
            window.updateLineNumbers();
            window.updatePreview();
        }

        window.togglePreviewFullScreen = function() {
            const el = document.getElementById('previewContainer');
            if (!document.fullscreenElement) {
                el.requestFullscreen().catch(err => {
                    window.showToast('ไม่สามารถขยายเต็มจอได้');
                });
            } else {
                document.exitFullscreen();
            }
        }

        window.saveCode = async function() {
            const url = localStorage.getItem('codeKeeper_url');
            const pass = localStorage.getItem('codeKeeper_pass');
            const title = document.getElementById('codeTitle').value.trim() || 'ไม่ได้ตั้งชื่อ';

            if (!url || !pass) { window.toggleConfig(); return window.showToast('⚠️ ตั้งค่า API ก่อนนะ'); }
            if (!editor.value.trim()) return window.showToast('⚠️ ยังไม่ได้เขียนโค้ด');

            const btn = document.getElementById('saveBtn');
            const isUpdate = !!window.currentEditingId;
            const action = isUpdate ? 'update' : 'create';
            
            btn.disabled = true;
            btn.innerText = "กำลังส่ง...";

            try {
                const body = { password: pass, code: editor.value, title: title, action: action };
                if(isUpdate) body.id = window.currentEditingId;

                const response = await fetch(url, { method: 'POST', body: JSON.stringify(body) });
                const result = await response.json();

                if (result.status === 'success') {
                    window.showToast('บันทึกเรียบร้อย! 🎉');
                    if (!isUpdate) { editor.value = ''; document.getElementById('codeTitle').value = ''; window.updateLineNumbers(); }
                    window.updatePreview(); 
                    window.showPage('home');
                } else { window.showToast('❌ ' + result.message); }
            } catch (error) { window.showToast('❌ เชื่อมต่อไม่ได้'); } 
            finally { btn.disabled = false; btn.innerText = "บันทึก"; }
        }

        window.loadList = async function() {
            window.showPage('list');
            const container = document.getElementById('listContainer');
            const url = localStorage.getItem('codeKeeper_url');

            if (!url) { container.innerHTML = '<div class="text-center text-gray-400 p-10">ไปตั้งค่า API ก่อนครับ</div>'; return; }
            container.innerHTML = '<div class="text-center mt-10 text-green-600"><i class="fas fa-spinner fa-spin text-3xl"></i><br>กำลังโหลด...</div>';

            try {
                const response = await fetch(`${url}?action=list`);
                const result = await response.json();

                if (result.status === 'success') {
                    if (result.data.length === 0) { container.innerHTML = '<div class="text-center text-gray-400 p-10">ไม่มีข้อมูล</div>'; return; }
                    let html = '';
                    result.data.forEach(item => {
                        const date = new Date(item.timestamp).toLocaleString('th-TH', { dateStyle: 'short', timeStyle: 'short' });
                        html += `
                            <div class="bg-white dark:bg-gray-800 p-4 md:p-6 rounded-xl shadow-sm border-l-4 border-green-500 flex justify-between items-center hover:shadow-md transition">
                                <div onclick="window.openView('${item.id}', true)" class="cursor-pointer flex-1 overflow-hidden">
                                    <div class="font-bold text-lg md:text-xl text-gray-800 dark:text-white truncate mb-1">${item.title || 'ไม่ได้ตั้งชื่อ'}</div>
                                    <div class="flex items-center gap-2 flex-wrap">
                                        <span class="bg-green-100 dark:bg-green-900 text-green-800 dark:text-green-300 text-[10px] md:text-xs px-2 py-0.5 rounded font-mono font-bold tracking-wide">ID: ${item.id.substring(0, 6)}</span>
                                        <span class="text-xs text-gray-400 font-light"><i class="far fa-clock mr-1"></i>${date}</span>
                                    </div>
                                </div>
                                <div class="flex gap-2 pl-3 shrink-0">
                                    <button onclick="event.stopPropagation(); window.shareCode('${item.id}')" class="text-purple-500 p-2 md:p-3 bg-purple-50 hover:bg-purple-100 rounded-full transition" title="สร้างลิงก์"><i class="fas fa-share-alt md:text-lg"></i></button>
                                    <button onclick="event.stopPropagation(); window.editCode('${item.id}')" class="text-blue-500 p-2 md:p-3 bg-blue-50 hover:bg-blue-100 rounded-full transition"><i class="fas fa-edit md:text-lg"></i></button>
                                    <button onclick="event.stopPropagation(); window.deleteCode('${item.id}')" class="text-red-500 p-2 md:p-3 bg-red-50 hover:bg-red-100 rounded-full transition"><i class="fas fa-trash md:text-lg"></i></button>
                                </div>
                            </div>`;
                    });
                    container.innerHTML = html;
                } else { container.innerHTML = '<div class="text-center text-red-500 p-10">Server Error</div>'; }
            } catch (e) { container.innerHTML = '<div class="text-center text-red-500 p-10">Connect Error</div>'; }
        }

        window.editCode = async function(id) {
            const url = localStorage.getItem('codeKeeper_url');
            if(!url) return;
            window.showToast('กำลังโหลดข้อมูล...');
            try {
                const response = await fetch(`${url}?action=view&id=${id}`);
                const result = await response.json();
                if(result.status === 'success') {
                    window.currentEditingId = id;
                    editor.value = result.code;
                    document.getElementById('codeTitle').value = result.title || '';
                    window.updateLineNumbers();
                    window.updatePreview();
                    window.showPage('create');
                }
            } catch(e) { window.showToast('Error loading'); }
        }

        window.deleteCode = async function(id) {
            if(!confirm('ลบจริงๆ นะ?')) return;
            const url = localStorage.getItem('codeKeeper_url');
            const pass = localStorage.getItem('codeKeeper_pass');
            try {
                const response = await fetch(url, {
                    method: 'POST', body: JSON.stringify({ password: pass, action: 'delete', id: id })
                });
                const result = await response.json();
                if(result.status === 'success') {
                    window.showToast('ลบแล้ว 🗑️');
                    window.loadList();
                }
            } catch(e) { window.showToast('Error deleting'); }
        }

        window.openView = async function(id, fromApp = false) {
            window.currentViewId = id; 
            window.showPage('view');
            document.getElementById('viewBackButton').style.display = fromApp ? 'flex' : 'none';

            const loader = document.getElementById('viewLoading');
            const frame = document.getElementById('fullViewFrame');
            const url = localStorage.getItem('codeKeeper_url');

            // Reset iframe
            frame.src = 'about:blank';
            loader.classList.remove('hidden');

            if (!url) {
                alert("ไม่มีการตั้งค่า API ไม่สามารถดูได้");
                window.showPage('home');
                return;
            }

            try {
                const response = await fetch(`${url}?action=view&id=${id}`);
                const result = await response.json();
                if (result.status === 'success') {
                    const blob = new Blob([result.code], {type: 'text/html'});
                    const blobUrl = URL.createObjectURL(blob);
                    frame.src = blobUrl;
                } else { alert('Not Found'); window.showPage('home'); }
            } catch(e) { alert('Error'); }
            finally { loader.classList.add('hidden'); }
        }

        window.shareCode = async function(id) {
            window.showToast('กำลังสร้างลิงก์... ⏳');
            await new Promise(r => setTimeout(r, 500));
            
            const apiUrl = localStorage.getItem('codeKeeper_url') || '';
            let paramString = `?id=${id}`;
            if(apiUrl) {
                try {
                    const encodedApi = btoa(apiUrl);
                    paramString += `&api=${encodedApi}`;
                } catch(e) {}
            }
            
            const link = `${window.location.origin}${window.location.pathname}${paramString}`;
            try { await navigator.clipboard.writeText(link); window.showToast('คัดลอกลิงก์เรียบร้อย! 🔗', 'success'); }
            catch (err) {
                const el = document.createElement('textarea'); el.value = link; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el);
                window.showToast('คัดลอกลิงก์เรียบร้อย! 🔗', 'success');
            }
        }
        window.shareCurrentView = function() { if(window.currentViewId) window.shareCode(window.currentViewId); }
        window.showToast = function(msg, type='info') {
            const toast = document.getElementById('toast'); document.getElementById('toastMsg').innerText = msg;
            toast.classList.remove('hidden'); setTimeout(() => { toast.classList.add('hidden'); }, 3000);
        }
        window.copyCurrentUrl = function() { window.shareCode(new URLSearchParams(window.location.search).get('id')); }

        window.addEventListener('load', () => {
            console.log("Tonkla System Loaded");
            window.initTheme();
            window.renderTodos(); // Load initial todos
            const urlParams = new URLSearchParams(window.location.search);
            if(urlParams.get('id')) window.openView(urlParams.get('id'), false);
        });
    </script>
</body>
</html>
