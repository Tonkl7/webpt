<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tonkla's Hub</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { 
                        slate: { 850: '#1e293b' },
                        primary: { DEFAULT: '#10b981', dark: '#059669' } 
                    },
                    fontFamily: {
                        sans: ['Sarabun', 'sans-serif'],
                        brand: ['Mitr', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    }
                }
            }
        }
    </script>
    
    <!-- Icons & Fonts -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&family=Mitr:wght@400;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Sarabun', sans-serif; 
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: none;
            transition: background-color 0.5s ease, color 0.5s ease;
        }
        
        /* 3D Button Effect */
        .btn-3d {
            transition: all 0.1s;
            border-bottom-width: 4px;
        }
        .btn-3d:active {
            transform: translateY(2px);
            border-bottom-width: 0px;
            margin-top: 4px; 
        }

        /* Transition Curtain */
        #transition-curtain {
            position: fixed; inset: 0; 
            background: #10b981; /* Green Brand Color */
            z-index: 100;
            transform: translateY(100%);
            transition: transform 0.6s cubic-bezier(0.77, 0, 0.175, 1);
            display: flex; align-items: center; justify-content: center;
        }
        #transition-curtain.active { transform: translateY(0); }
        .dark #transition-curtain { background: #064e3b; }

        /* App Frame Layer */
        #app-frame-layer {
            position: fixed; inset: 0; width: 100%; height: 100%;
            z-index: 50;
            background: white;
            transform: translateX(100%);
            transition: transform 0.1s; /* Instant switch handled by curtain */
        }
        #app-frame-layer.active { transform: translateX(0); }

        .clean-grid-bg {
            background-size: 40px 40px;
            background-image: radial-gradient(circle, #00000008 1px, transparent 1px);
        }
        .dark .clean-grid-bg {
            background-image: radial-gradient(circle, #ffffff08 1px, transparent 1px);
        }

        /* Right Drawer */
        #time-drawer {
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #time-drawer.open { transform: translateX(0); }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-[#0f172a] text-gray-800 dark:text-gray-100 h-[100dvh] w-screen overflow-hidden">

    <!-- TRANSITION CURTAIN -->
    <div id="transition-curtain">
        <div class="text-white text-3xl font-brand font-bold animate-bounce">
            <i class="fas fa-circle-notch fa-spin mr-2"></i> Loading...
        </div>
    </div>

    <!-- LAYER 1: HUB -->
    <div id="hub-layer" class="w-full h-full flex flex-col relative clean-grid-bg overflow-hidden">
        <nav class="h-16 px-6 md:px-10 flex items-center justify-between bg-white/80 dark:bg-slate-850/80 backdrop-blur-md border-b border-gray-200 dark:border-gray-700 shrink-0 sticky top-0 z-20">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-green-600 rounded-lg flex items-center justify-center text-white shadow-lg"><i class="fas fa-leaf"></i></div>
                <h1 class="text-xl font-brand font-bold tracking-tight">Tonkla's <span class="text-green-600">Hub</span></h1>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="hub.toggleTheme()" class="w-9 h-9 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700 flex items-center justify-center text-gray-500 transition"><i class="fas fa-adjust"></i></button>
                <button onclick="hub.openManageModal()" class="w-9 h-9 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700 flex items-center justify-center text-gray-500 transition relative"><i class="fas fa-pen"></i></button>
            </div>
        </nav>

        <main class="flex-1 p-6 md:p-10 overflow-y-auto z-10 flex flex-col items-center">
            <h2 class="text-2xl md:text-3xl font-brand font-bold text-gray-700 dark:text-gray-200 mb-8 mt-4 animate-pulse-slow text-center">เลือกพื้นที่ที่จะแสดง</h2>
            
            <div id="app-grid" class="grid grid-cols-2 xs:grid-cols-2 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-6 pb-20 w-full max-w-6xl">
                <!-- Dynamic Apps will be injected here -->
                
                <!-- Add Button (Always last) -->
                <div onclick="hub.openAddModal()" class="btn-3d aspect-square border-2 border-dashed border-gray-300 dark:border-gray-700 rounded-2xl flex flex-col items-center justify-center text-gray-400 dark:text-gray-600 hover:bg-gray-50 dark:hover:bg-slate-800 cursor-pointer transition-all border-b-gray-300 dark:border-b-gray-700 group">
                    <i class="fas fa-plus text-3xl mb-2 group-hover:scale-110 transition-transform"></i>
                    <span class="text-xs font-bold">Add Project</span>
                </div>
            </div>
        </main>

        <footer class="p-4 text-center text-xs text-gray-400 font-mono border-t border-gray-200 dark:border-gray-800 bg-gray-50 dark:bg-slate-900/50">
            Tonkla's Hub System • GitHub Page Linker
        </footer>
    </div>

    <!-- LAYER 2: APP FRAME (Web Viewer) -->
    <div id="app-frame-layer" class="flex flex-col bg-white dark:bg-gray-900">
        <!-- Floating Home Button -->
        <button onclick="hub.goHome()" class="fixed top-4 left-4 z-[60] w-10 h-10 bg-black/50 hover:bg-black/70 backdrop-blur text-white rounded-full flex items-center justify-center shadow-lg transition hover:scale-110">
            <i class="fas fa-home"></i>
        </button>
        
        <iframe id="web-frame" class="w-full h-full border-none bg-white"></iframe>
    </div>

    <!-- RIGHT DRAWER (Time) -->
    <button onclick="hub.toggleDrawer()" class="fixed right-0 top-24 z-30 bg-green-600 text-white p-3 rounded-l-xl shadow-lg hover:pr-5 transition-all duration-300 flex items-center gap-2 group animate-pulse-slow">
        <i class="fas fa-chevron-left group-hover:animate-bounce"></i><i class="far fa-clock"></i>
    </button>

    <div id="time-drawer" class="fixed top-0 right-0 h-full w-80 bg-white dark:bg-slate-800 shadow-2xl z-[40] transform translate-x-full border-l border-gray-200 dark:border-gray-700 flex flex-col">
        <div class="p-5 border-b border-gray-100 dark:border-gray-700 flex justify-between items-center bg-gray-50 dark:bg-slate-900">
            <h3 class="font-brand font-bold text-lg text-green-600"><i class="far fa-calendar-alt mr-2"></i>Time</h3>
            <button onclick="hub.toggleDrawer()" class="text-gray-400 hover:text-red-500 transition"><i class="fas fa-times text-lg"></i></button>
        </div>
        <div class="flex-1 overflow-y-auto p-5 space-y-6">
            <div class="text-center">
                <div id="drawer-greeting" class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-1">HELLO</div>
                <h2 id="drawer-clock" class="text-5xl font-mono font-bold text-gray-800 dark:text-white mb-1">00:00</h2>
                <p id="drawer-date" class="text-sm text-green-600 dark:text-green-400 font-medium">Loading...</p>
            </div>
            <!-- Calendar Grid -->
            <div>
                <p id="calendar-month" class="text-center font-bold mb-3 text-gray-800 dark:text-white text-sm"></p>
                <div class="grid grid-cols-7 gap-1 text-center text-[10px] font-bold text-gray-400 mb-1">
                    <div>อา</div><div>จ</div><div>อ</div><div>พ</div><div>พฤ</div><div>ศ</div><div>ส</div>
                </div>
                <div id="calendar-days" class="grid grid-cols-7 gap-1 text-center text-sm"></div>
            </div>
        </div>
    </div>
    <div id="drawer-backdrop" class="fixed inset-0 bg-black/20 backdrop-blur-sm z-[35] hidden transition-opacity" onclick="hub.toggleDrawer()"></div>

    <!-- MODALS -->
    <!-- Add Modal -->
    <div id="addModal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
        <div class="bg-white dark:bg-slate-800 w-full max-w-sm rounded-2xl shadow-2xl p-6">
            <h3 class="font-bold text-xl font-brand mb-4">Add Web Link</h3>
            <input type="text" id="addName" placeholder="Project Name" class="w-full mb-3 p-3 bg-gray-50 dark:bg-slate-900 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 dark:text-white">
            <input type="url" id="addUrl" placeholder="https://..." class="w-full mb-4 p-3 bg-gray-50 dark:bg-slate-900 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 dark:text-white">
            <div class="flex justify-end gap-2">
                <button onclick="hub.closeAddModal()" class="px-4 py-2 text-gray-500 font-bold">Cancel</button>
                <button onclick="hub.addLink()" class="px-6 py-2 bg-green-600 text-white rounded-lg font-bold hover:bg-green-700">Add</button>
            </div>
        </div>
    </div>

    <!-- Manage Modal -->
    <div id="manageModal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
        <div class="bg-white dark:bg-slate-800 w-full max-w-sm rounded-2xl shadow-2xl p-6 max-h-[80vh] flex flex-col">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-bold text-xl font-brand">Manage Links</h3>
                <button onclick="hub.closeManageModal()" class="text-gray-400"><i class="fas fa-times"></i></button>
            </div>
            <div id="manageList" class="flex-1 overflow-y-auto space-y-2"></div>
        </div>
    </div>

    <script>
        const hub = {
            links: [],
            
            init: function() {
                this.loadLinks();
                this.renderGrid();
                this.startClock();
                
                const isDark = localStorage.getItem('tonkla_theme') === 'dark';
                if(isDark) document.documentElement.classList.add('dark');
            },

            // --- DATA LOGIC ---
            loadLinks: function() {
                const stored = localStorage.getItem('webhub_links');
                this.links = stored ? JSON.parse(stored) : [];
            },
            saveLinks: function() {
                localStorage.setItem('webhub_links', JSON.stringify(this.links));
            },
            
            getRandomColor: function() {
                const colors = ['bg-red-500', 'bg-orange-500', 'bg-amber-500', 'bg-lime-500', 'bg-emerald-500', 'bg-cyan-500', 'bg-indigo-500', 'bg-violet-500', 'bg-pink-500', 'bg-rose-500'];
                return colors[Math.floor(Math.random() * colors.length)];
            },

            // --- UI RENDER ---
            renderGrid: function() {
                const grid = document.getElementById('app-grid');
                // Keep only the "Add Button" (last child)
                const addBtn = grid.lastElementChild;
                grid.innerHTML = '';
                
                this.links.forEach(link => {
                    const el = document.createElement('div');
                    // Random color for icon background
                    const bgClass = link.color || this.getRandomColor();
                    if(!link.color) { link.color = bgClass; this.saveLinks(); }

                    el.className = "btn-3d group relative aspect-square bg-white dark:bg-slate-800 border-gray-200 dark:border-gray-700 rounded-2xl cursor-pointer hover:bg-gray-50 dark:hover:bg-slate-700 flex flex-col items-center justify-center p-4 shadow-sm hover:shadow-md transition-all border-b-gray-300 dark:border-b-slate-600 overflow-hidden";
                    el.onclick = () => this.openLink(link.url);
                    
                    el.innerHTML = `
                        <div class="w-16 h-16 ${bgClass} rounded-xl flex items-center justify-center mb-3 text-white group-hover:scale-110 transition-transform duration-300 shadow-md">
                            <i class="fas fa-globe text-3xl"></i>
                        </div>
                        <span class="font-bold font-brand text-gray-700 dark:text-gray-200 text-sm text-center truncate w-full px-1">${link.name}</span>
                    `;
                    grid.appendChild(el);
                });
                
                grid.appendChild(addBtn);
            },

            // --- NAVIGATION ---
            openLink: function(url) {
                const curtain = document.getElementById('transition-curtain');
                const appLayer = document.getElementById('app-frame-layer');
                const frame = document.getElementById('web-frame');

                // 1. Curtain Up
                curtain.classList.add('active');

                // 2. Load URL behind curtain
                setTimeout(() => {
                    frame.src = url;
                    appLayer.classList.add('active');
                    
                    // 3. Curtain Down (reveal app)
                    setTimeout(() => {
                        curtain.classList.remove('active');
                    }, 800); // Wait for transition
                }, 600); // Wait for curtain to cover
            },

            goHome: function() {
                const curtain = document.getElementById('transition-curtain');
                const appLayer = document.getElementById('app-frame-layer');
                const frame = document.getElementById('web-frame');

                // 1. Curtain Up
                curtain.classList.add('active');

                setTimeout(() => {
                    appLayer.classList.remove('active');
                    frame.src = 'about:blank'; // Clear iframe
                    
                    // 2. Curtain Down (reveal hub)
                    setTimeout(() => {
                        curtain.classList.remove('active');
                    }, 600);
                }, 600);
            },

            // --- ADD / MANAGE ---
            openAddModal: () => document.getElementById('addModal').classList.remove('hidden'),
            closeAddModal: () => document.getElementById('addModal').classList.add('hidden'),
            
            addLink: function() {
                const name = document.getElementById('addName').value.trim();
                let url = document.getElementById('addUrl').value.trim();
                
                if(!name || !url) return alert("Please fill all fields");
                if(!url.startsWith('http')) url = 'https://' + url;

                this.links.push({ id: Date.now(), name, url });
                this.saveLinks();
                this.renderGrid();
                
                document.getElementById('addName').value = '';
                document.getElementById('addUrl').value = '';
                this.closeAddModal();
            },

            openManageModal: function() {
                document.getElementById('manageModal').classList.remove('hidden');
                this.renderManageList();
            },
            closeManageModal: () => document.getElementById('manageModal').classList.add('hidden'),

            renderManageList: function() {
                const list = document.getElementById('manageList');
                list.innerHTML = '';
                if(this.links.length === 0) list.innerHTML = '<p class="text-center text-gray-400">No links yet.</p>';
                
                this.links.forEach(link => {
                    const div = document.createElement('div');
                    div.className = "flex justify-between items-center bg-gray-50 dark:bg-slate-900 p-3 rounded-lg border border-gray-100 dark:border-gray-700";
                    div.innerHTML = `
                        <div class="truncate mr-2">
                            <div class="font-bold text-sm dark:text-white">${link.name}</div>
                            <div class="text-xs text-gray-400 truncate">${link.url}</div>
                        </div>
                        <button onclick="hub.deleteLink(${link.id})" class="text-red-500 hover:bg-red-50 p-2 rounded"><i class="fas fa-trash"></i></button>
                    `;
                    list.appendChild(div);
                });
            },

            deleteLink: function(id) {
                if(confirm("Delete this link?")) {
                    this.links = this.links.filter(l => l.id !== id);
                    this.saveLinks();
                    this.renderGrid();
                    this.renderManageList();
                }
            },

            // --- THEME & DRAWER ---
            toggleTheme: function() {
                document.documentElement.classList.toggle('dark');
                const isDark = document.documentElement.classList.contains('dark');
                localStorage.setItem('tonkla_theme', isDark ? 'dark' : 'light');
            },
            toggleDrawer: function() {
                const d = document.getElementById('time-drawer');
                const b = document.getElementById('drawer-backdrop');
                if(d.classList.contains('open')) {
                    d.classList.remove('open'); b.classList.add('hidden');
                } else {
                    d.classList.add('open'); b.classList.remove('hidden');
                    this.renderCalendar();
                }
            },
            
            // --- TIME & CALENDAR ---
            startClock: function() {
                setInterval(() => {
                    const now = new Date();
                    document.getElementById('drawer-clock').innerText = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
                    document.getElementById('drawer-date').innerText = now.toLocaleDateString('th-TH', { weekday:'long', day:'numeric', month:'long' });
                    
                    const h = now.getHours();
                    document.getElementById('drawer-greeting').innerText = h < 12 ? "GOOD MORNING" : h < 17 ? "GOOD AFTERNOON" : "GOOD EVENING";
                }, 1000);
            },
            renderCalendar: function() {
                const now = new Date();
                const y = now.getFullYear(), m = now.getMonth();
                document.getElementById('calendar-month').innerText = now.toLocaleDateString('th-TH', { month: 'long', year: 'numeric' });
                
                const firstDay = new Date(y, m, 1).getDay();
                const daysInMonth = new Date(y, m + 1, 0).getDate();
                const grid = document.getElementById('calendar-days');
                grid.innerHTML = '';
                
                for(let i=0; i<firstDay; i++) grid.appendChild(document.createElement('div'));
                for(let i=1; i<=daysInMonth; i++) {
                    const d = document.createElement('div');
                    d.className = "aspect-square flex items-center justify-center rounded-full hover:bg-gray-100 dark:hover:bg-gray-700";
                    if(i===now.getDate()) d.className += " bg-green-500 text-white font-bold";
                    d.innerText = i;
                    grid.appendChild(d);
                }
            }
        };

        window.addEventListener('load', () => hub.init());
    </script>
</body>
</html>
