<!DOCTYPE html>
<html lang="th" class="">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tonkla Code Keeper</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: {
                            light: '#4ade80',
                            DEFAULT: '#16a34a',
                            dark: '#14532d',
                        }
                    }
                }
            }
        }
    </script>
    <!-- Font Awesome & Google Fonts -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&family=Mitr:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; transition: background-color 0.5s, color 0.5s; }
        h1, h2, h3, .brand-font { font-family: 'Mitr', sans-serif; }
        .code-editor { font-family: 'Courier New', Courier, monospace; }
        
        /* Custom Scrollbar */
        .dark ::-webkit-scrollbar { width: 8px; }
        .dark ::-webkit-scrollbar-track { background: #0f172a; }
        .dark ::-webkit-scrollbar-thumb { background: #166534; border-radius: 4px; }
        .dark ::-webkit-scrollbar-thumb:hover { background: #15803d; }

        .page-transition { transition: opacity 0.3s ease-in-out; }
        
        /* Range Slider */
        input[type=range] { -webkit-appearance: none; background: transparent; }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 16px; width: 16px; border-radius: 50%;
            background: #16a34a; margin-top: -6px; cursor: pointer;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%; height: 4px; background: #d1d5db; border-radius: 2px;
        }
        .dark input[type=range]::-webkit-slider-thumb { background: #4ade80; }
        .dark input[type=range]::-webkit-slider-runnable-track { background: #374151; }

        /* Fullscreen Fixes */
        :fullscreen { overflow: hidden; background: white; }
        :fullscreen .bg-white { background: white; }
        .dark :fullscreen { background: #111827; }

        /* Mobile Height Fix (dvh) */
        .h-dynamic { height: 100vh; height: 100dvh; }
    </style>
</head>
<body class="bg-green-50 text-gray-800 dark:bg-gray-900 dark:text-gray-100 h-dynamic flex flex-col overflow-hidden transition-colors duration-500">

    <!-- Navbar -->
    <nav class="bg-green-600 dark:bg-green-900 text-white shadow-lg z-30 shrink-0 transition-colors duration-500">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <!-- Brand -->
                <div class="flex items-center cursor-pointer transform hover:scale-105 transition" onclick="showPage('home')">
                    <i class="fas fa-seedling fa-lg mr-2 text-green-200"></i>
                    <span class="font-bold text-xl brand-font">Tonkla Code</span>
                </div>
                <!-- Menu -->
                <div class="flex space-x-2 sm:space-x-4">
                    <button onclick="showPage('create')" class="hover:bg-green-500 dark:hover:bg-green-800 px-3 py-2 rounded-full text-sm font-medium transition"><i class="fas fa-pen sm:mr-1"></i> <span class="hidden sm:inline">เขียน</span></button>
                    <button onclick="loadList()" class="hover:bg-green-500 dark:hover:bg-green-800 px-3 py-2 rounded-full text-sm font-medium transition"><i class="fas fa-folder sm:mr-1"></i> <span class="hidden sm:inline">งาน</span></button>
                    <button onclick="toggleConfig()" class="hover:bg-green-500 dark:hover:bg-green-800 px-3 py-2 rounded-full text-sm font-medium transition"><i class="fas fa-cog"></i></button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Configuration Modal -->
    <div id="configModal" class="hidden fixed inset-0 bg-black bg-opacity-60 backdrop-blur-sm h-full w-full z-50 flex items-center justify-center p-4">
        <div class="relative bg-white dark:bg-gray-800 rounded-2xl shadow-2xl p-6 w-full max-w-md animate-fade-in-down border border-green-100 dark:border-green-900 transition-colors duration-300 max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-6 border-b border-gray-100 dark:border-gray-700 pb-2">
                <h3 class="text-xl font-bold text-green-700 dark:text-green-400 brand-font">ตั้งค่าระบบนิเวศ</h3>
                <button onclick="toggleConfig()" class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-200"><i class="fas fa-times"></i></button>
            </div>

            <!-- General Settings -->
            <div class="space-y-6">
                
                <!-- Theme Toggle -->
                <div class="flex justify-between items-center">
                    <div class="flex items-center">
                        <div class="w-8 h-8 rounded-full bg-gray-100 dark:bg-gray-700 flex items-center justify-center mr-3 text-green-600 dark:text-green-400">
                            <i class="fas fa-moon"></i>
                        </div>
                        <div>
                            <p class="font-bold text-gray-700 dark:text-gray-200">โหมดป่าตอนกลางคืน</p>
                            <p class="text-xs text-gray-500 dark:text-gray-400">เปลี่ยนธีมเป็นสีมืด</p>
                        </div>
                    </div>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="darkModeToggle" class="sr-only peer" onchange="toggleDarkMode()">
                        <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer dark:bg-gray-700 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-green-600"></div>
                    </label>
                </div>

                <!-- Easter Egg: Ambient Sound -->
                <div class="bg-green-50 dark:bg-gray-700/50 p-4 rounded-xl">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-sm font-bold text-gray-700 dark:text-gray-200"><i class="fas fa-music mr-2"></i>บรรยากาศในป่า</span>
                        <span id="volumeLabel" class="text-xs text-green-600 dark:text-green-400 font-bold">เงียบสงบ</span>
                    </div>
                    <input type="range" id="volumeSlider" min="0" max="100" value="0" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer dark:bg-gray-700">
                    <p class="text-xs text-gray-500 dark:text-gray-400 mt-2 text-center">ลองปรับดูสิ... ได้ยินเสียงอะไรไหม?</p>
                </div>

                <!-- Advanced Settings Toggle -->
                <div class="pt-2">
                    <button onclick="document.getElementById('advancedSettings').classList.toggle('hidden')" class="text-xs text-gray-400 hover:text-green-600 underline w-full text-center">
                        แสดงการตั้งค่าขั้นสูง (API)
                    </button>
                    
                    <div id="advancedSettings" class="hidden mt-4 space-y-3 p-3 bg-gray-50 dark:bg-gray-900 rounded-lg border border-gray-200 dark:border-gray-700">
                        <div>
                            <label class="block text-gray-600 dark:text-gray-400 text-xs font-bold mb-1">Web App URL</label>
                            <input type="text" id="apiUrlInput" class="w-full p-2 text-sm bg-white dark:bg-gray-800 border rounded dark:border-gray-600 focus:ring-1 focus:ring-green-500 outline-none" placeholder="https://script.google.com/...">
                        </div>
                        <div>
                            <label class="block text-gray-600 dark:text-gray-400 text-xs font-bold mb-1">รหัสผ่าน</label>
                            <input type="password" id="apiPassInput" class="w-full p-2 text-sm bg-white dark:bg-gray-800 border rounded dark:border-gray-600 focus:ring-1 focus:ring-green-500 outline-none">
                        </div>
                    </div>
                </div>
            </div>

            <div class="mt-6 flex justify-end">
                <button onclick="saveConfig()" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-xl shadow-lg transform active:scale-95 transition">บันทึกการตั้งค่า</button>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <main class="flex-1 overflow-hidden relative flex flex-col">
        
        <!-- Page: Home -->
        <div id="page-home" class="page-transition absolute inset-0 p-8 flex flex-col items-center justify-center text-center overflow-y-auto">
            <div class="bg-white/80 dark:bg-gray-800/80 backdrop-blur-md p-10 rounded-3xl shadow-2xl max-w-lg w-full border border-green-100 dark:border-green-900">
                <div class="inline-block p-4 rounded-full bg-green-100 dark:bg-green-900/30 mb-6 animate-bounce-slow">
                    <i class="fas fa-seedling text-6xl text-green-500 dark:text-green-400"></i>
                </div>
                <h1 class="text-3xl font-bold mb-2 text-gray-800 dark:text-white">Tonkla's Space</h1>
                <p class="text-gray-600 dark:text-gray-300 mb-8 font-light">พื้นที่เก็บโค้ดส่วนตัวสไตล์ธรรมชาติ</p>
                <div class="flex flex-col sm:flex-row justify-center gap-4">
                    <button onclick="startNewCode()" class="bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-8 rounded-xl transition shadow-lg hover:shadow-green-500/30">
                        <i class="fas fa-plus mr-2"></i> ปลูกต้นกล้าใหม่
                    </button>
                    <button onclick="loadList()" class="bg-white dark:bg-transparent dark:text-green-300 dark:border-green-500 hover:bg-green-50 text-green-600 font-bold py-3 px-8 border border-green-600 rounded-xl transition shadow-sm">
                        <i class="fas fa-folder-open mr-2"></i> สำรวจงานเก่า
                    </button>
                </div>
            </div>
        </div>

        <!-- Page: Create/Edit (Responsive Fixed) -->
        <div id="page-create" class="page-transition absolute inset-0 flex flex-col hidden bg-white dark:bg-gray-900 h-full">
            <!-- Header -->
             <div class="bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 px-4 py-2 flex items-center justify-between shrink-0 h-14">
                <button onclick="showPage('home')" class="text-gray-500 hover:text-green-600 dark:text-gray-400 dark:hover:text-green-400 transition flex items-center">
                    <i class="fas fa-arrow-left mr-2"></i> <span class="hidden sm:inline">ย้อนกลับ</span>
                </button>
                <span id="editorTitle" class="font-bold text-gray-700 dark:text-gray-200 truncate mx-2">ปลูกต้นกล้าใหม่</span>
                
                <button onclick="toggleFullScreen()" class="text-gray-500 hover:text-green-600 dark:text-gray-400 dark:hover:text-green-400 transition p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700" title="เต็มจอ">
                    <i id="fsIcon" class="fas fa-expand"></i>
                </button>
            </div>

            <!-- Editor Content Area (Flex Grow) -->
            <div class="flex-1 flex flex-col md:flex-row overflow-hidden relative">
                <!-- Editor (Top/Left) -->
                <div class="w-full md:w-1/2 flex flex-col border-b md:border-b-0 md:border-r border-gray-200 dark:border-gray-700 h-1/2 md:h-full">
                    <div class="bg-gray-50 dark:bg-gray-800 px-4 py-2 border-b border-gray-200 dark:border-gray-700 flex justify-between items-center shrink-0">
                        <span class="font-bold text-gray-600 dark:text-gray-300 text-sm"><i class="fas fa-code text-green-500 mr-2"></i>Code</span>
                        <button onclick="insertTemplate()" class="text-xs bg-white dark:bg-gray-700 border dark:border-gray-600 hover:bg-gray-100 px-2 py-1 rounded text-gray-600 dark:text-gray-300 transition">โครงสร้าง</button>
                    </div>
                    <textarea id="codeEditor" class="flex-1 p-4 w-full h-full resize-none code-editor outline-none text-sm bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-green-300 focus:bg-white dark:focus:bg-black transition placeholder-gray-400 dark:placeholder-gray-600" placeholder="<!-- วางโค้ดที่นี่ได้เลยครับน้องต้นกล้า -->"></textarea>
                </div>
                
                <!-- Preview (Bottom/Right) -->
                <div id="previewContainer" class="w-full md:w-1/2 flex flex-col bg-white dark:bg-black h-1/2 md:h-full relative">
                    <div class="bg-gray-50 dark:bg-gray-800 px-4 py-2 border-b border-gray-200 dark:border-gray-700 flex justify-between items-center shrink-0">
                        <span class="font-bold text-gray-600 dark:text-gray-300 text-sm"><i class="fas fa-eye text-green-500 mr-2"></i>Preview</span>
                        <div class="flex space-x-2">
                            <button onclick="togglePreviewFullScreen()" class="text-gray-500 hover:text-green-600 dark:text-gray-400 dark:hover:text-green-400 transition px-2" title="ดูผลลัพธ์เต็มจอ">
                                <i id="previewFsIcon" class="fas fa-expand text-xs"></i>
                            </button>
                            <button onclick="updatePreview()" class="text-xs text-green-600 hover:text-green-800 dark:text-green-400 ml-2"><i class="fas fa-sync-alt"></i></button>
                        </div>
                    </div>
                    <iframe id="previewFrame" class="flex-1 w-full h-full border-none bg-white"></iframe>
                </div>
            </div>

            <!-- Toolbar (Fixed Bottom) -->
            <div class="bg-white dark:bg-gray-800 border-t border-gray-200 dark:border-gray-700 p-3 sm:p-4 flex justify-between items-center shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.1)] z-30 shrink-0 h-auto">
                <div class="text-gray-400 text-xs sm:text-sm flex items-center">
                    <div class="w-2 h-2 rounded-full bg-green-500 mr-2 animate-pulse"></div>
                    <span id="statusMsg">พร้อม</span>
                </div>
                <button onclick="saveCode()" id="saveBtn" class="bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-6 rounded-lg shadow-lg hover:shadow-green-500/40 transition flex items-center">
                    <i class="fas fa-save mr-2"></i> บันทึก
                </button>
            </div>
        </div>

        <!-- Page: List -->
        <div id="page-list" class="page-transition absolute inset-0 overflow-y-auto hidden bg-gray-50 dark:bg-gray-900 p-4 sm:p-8">
            <div class="max-w-4xl mx-auto pb-20"> <!-- Added padding bottom for mobile -->
                <div class="flex items-center mb-6">
                    <button onclick="showPage('home')" class="mr-4 bg-white dark:bg-gray-800 p-2 rounded-full shadow hover:bg-green-50 dark:hover:bg-gray-700 text-gray-500 hover:text-green-600 dark:text-gray-400 transition">
                        <i class="fas fa-arrow-left"></i>
                    </button>
                    <h2 class="text-2xl font-bold text-gray-800 dark:text-white brand-font">แปลงเพาะปลูกของต้นกล้า</h2>
                </div>
                <div id="listContainer" class="grid gap-4">
                    <!-- Loading Skeleton -->
                    <div class="bg-white dark:bg-gray-800 p-6 rounded-xl shadow-sm animate-pulse border border-gray-100 dark:border-gray-700">
                        <div class="h-4 bg-gray-200 dark:bg-gray-700 rounded w-1/3 mb-2"></div>
                        <div class="h-3 bg-gray-100 dark:bg-gray-700 rounded w-1/5"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Page: View -->
        <div id="page-view" class="page-transition absolute inset-0 hidden flex flex-col bg-white">
            <div class="bg-green-800 text-white px-4 py-2 flex justify-between items-center shadow-md z-20 shrink-0">
                <button onclick="showPage('list')" class="bg-green-700 hover:bg-green-600 text-white px-3 py-1 rounded-full text-sm transition shadow-sm">
                    <i class="fas fa-arrow-left mr-1"></i> ย้อนกลับ
                </button>
                <div class="text-sm font-bold opacity-80 brand-font">Tonkla Viewer</div>
                <button onclick="copyCurrentUrl()" class="text-xs bg-green-700 hover:bg-green-600 px-3 py-1 rounded transition">
                    <i class="fas fa-share-alt"></i>
                </button>
            </div>
            <iframe id="fullViewFrame" class="flex-1 w-full h-full border-none bg-white"></iframe>
            <div id="viewLoading" class="absolute inset-0 flex items-center justify-center bg-white dark:bg-gray-900 z-10">
                <div class="text-center">
                    <i class="fas fa-seedling fa-spin text-4xl text-green-500 mb-4"></i>
                    <p class="text-gray-500 dark:text-gray-400">กำลังดึงข้อมูลจากราก...</p>
                </div>
            </div>
        </div>

    </main>

    <!-- Toast -->
    <div id="toast" class="hidden fixed bottom-5 right-5 bg-gray-800 dark:bg-white text-white dark:text-gray-900 px-6 py-3 rounded-xl shadow-2xl transform transition-all duration-300 translate-y-10 opacity-0 z-50 flex items-center font-bold">
        <i class="fas fa-info-circle mr-2 text-green-500"></i>
        <span id="toastMsg">Notification</span>
    </div>

    <!-- Audio Element -->
    <audio id="bgMusic" loop>
        <source src="https://actions.google.com/sounds/v1/ambiences/forest_morning.ogg" type="audio/ogg">
    </audio>

    <script>
        // Global variables for State
        let currentEditingId = null;

        // --- Theme & Settings ---
        function initTheme() {
            try {
                const isDark = localStorage.getItem('tonkla_theme') === 'dark';
                applyTheme(isDark);
                
                document.getElementById('apiUrlInput').value = localStorage.getItem('codeKeeper_url') || '';
                document.getElementById('apiPassInput').value = localStorage.getItem('codeKeeper_pass') || '';
            } catch (e) {
                console.log('Cannot access localStorage for theme');
            }
        }

        function toggleDarkMode() {
            const toggle = document.getElementById('darkModeToggle');
            applyTheme(toggle.checked);
            try {
                localStorage.setItem('tonkla_theme', toggle.checked ? 'dark' : 'light');
            } catch (e) {}
        }

        function applyTheme(isDark) {
            const html = document.documentElement;
            const toggle = document.getElementById('darkModeToggle');
            
            if (isDark) {
                html.classList.add('dark');
                toggle.checked = true;
            } else {
                html.classList.remove('dark');
                toggle.checked = false;
            }
        }

        // --- Easter Egg Audio ---
        const volumeSlider = document.getElementById('volumeSlider');
        const bgMusic = document.getElementById('bgMusic');
        const volumeLabel = document.getElementById('volumeLabel');

        volumeSlider.addEventListener('input', (e) => {
