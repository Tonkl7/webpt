<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting...</title>
  <script>
    (function () {
      const APP_FILE = '/webpt/code/V1/webhub-fixed-v6.html';
      const APP_DIR = '/webpt/code/V1/';

      const path = decodeURIComponent(window.location.pathname).replace(/\/+$/, '');
      const dir = APP_DIR.replace(/\/+$/, '');

      // ถ้าเข้ามาที่ /webpt/code/V1/bhfyj30ww
      if (path.startsWith(dir + '/')) {
        const last = path.split('/').pop();

        // เฉพาะ id ที่ไม่มีจุด เช่น bhfyj30ww
        if (last && !last.includes('.')) {
          window.location.replace(APP_FILE + '?id=' + encodeURIComponent(last));
          return;
        }
      }

      // ถ้าเปิดโฟลเดอร์ /webpt/code/V1/
      if (path === dir) {
        window.location.replace(APP_FILE);
        return;
      }

      // fallback
      window.location.replace('/webpt/');
    })();
  </script>
</head>
<body></body>
</html>
