<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting...</title>
  <script>
    (function () {
      const APP_BASE = '/webpt/code/V1/';
      const INDEX_URL = '/webpt/code/V1/index.html';
      const HOME_URL = '/webpt/';

      const path = decodeURIComponent(window.location.pathname).replace(/\/+$/, '');

      // ถ้าเข้า /webpt/code/V1 หรือ /webpt/code/V1/
      if (path === APP_BASE.slice(0, -1)) {
        window.location.replace(INDEX_URL);
        return;
      }

      // ถ้าเข้า /webpt/code/V1/<id>
      if (path.startsWith(APP_BASE)) {
        const id = path.split('/').filter(Boolean).pop();
        if (id && !id.includes('.')) {
          window.location.replace(INDEX_URL + '?id=' + encodeURIComponent(id));
          return;
        }
      }

      // fallback
      window.location.replace(HOME_URL);
    })();
  </script>
</head>
<body></body>
</html>
