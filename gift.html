<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ของขวัญให้หมูอ้วนนนน 🐷💖</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts: Mali (ลายมือน่ารักๆ) -->
    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@300;500;700&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            font-family: 'Mali', cursive;
            background-color: #fce7f3; /* pink-100 */
            /* ลายจุดน่ารักๆ */
            background-image: radial-gradient(#fbcfe8 2px, transparent 2px);
            background-size: 24px 24px;
            overscroll-behavior: none; /* ป้องกันการดึงหน้าจอบนมือถือ */
            -webkit-tap-highlight-color: transparent; /* ปิดสีไฮไลท์เวลากดบนมือถือ */
        }

        .gift-card {
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            user-select: none;
        }
        
        .gift-card:active {
            transform: scale(0.95);
        }

        /* สถานะเปิดแล้ว */
        .gift-opened {
            background-color: #fff1f2 !important; /* pink-50 */
            border-color: #f472b6 !important; /* pink-400 */
        }

        /* Animation สั่นเมื่อเปิดไม่ได้ */
        .shake {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        /* กล่องลอยดุ๊กดิ๊ก */
        .float-anim {
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-6px); }
            100% { transform: translateY(0px); }
        }

        /* Modal & UI */
        .hidden-custom { display: none !important; }
        
        /* Progress Bar Animation */
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        .animate-shimmer {
            background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.4) 50%, rgba(255,255,255,0) 100%);
            background-size: 200% 100%;
            animation: shimmer 2s infinite;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-12 px-4 text-pink-700 relative overflow-x-hidden">

    <!-- Header -->
    <header class="text-center mb-10 z-10 animate-fade-in-down">
        <!-- Secret Trigger Here (กด 20 ครั้งเพื่อเปิดโหมดทดสอบ) -->
        <div id="secret-trigger" class="text-6xl mb-2 animate-bounce drop-shadow-md cursor-default select-none transition-transform active:scale-90">💌</div>
        <h1 class="text-3xl font-bold tracking-wide drop-shadow-sm">ของขวัญให้หมูอ้วนนนน</h1>
        <p class="text-pink-400 text-sm mt-2 font-medium">เก็บไว้เปิดตามวันที่นะ!</p>
    </header>

    <!-- Gift Container -->
    <div class="grid grid-cols-1 gap-5 w-full max-w-sm z-10 mb-24">
        
        <!-- Gift 1 -->
        <div id="card-1" onclick="handleCardClick(1)" class="gift-card bg-white rounded-3xl p-5 shadow-xl border-b-[6px] border-pink-200 flex items-center gap-4 cursor-pointer relative overflow-hidden group">
            <div class="bg-red-100 p-3 rounded-full text-3xl float-anim shadow-inner">🎁</div>
            <div class="flex-1">
                <h2 class="text-xl font-bold text-gray-700 group-hover:text-pink-500 transition-colors">ของขวัญชิ้นที่ 1</h2>
                <p class="text-xs text-gray-400 font-medium bg-gray-100 inline-block px-2 py-1 rounded-lg mt-1">19 กุมภาพันธ์</p>
            </div>
            <div id="status-icon-1" class="w-10 h-10 flex items-center justify-center rounded-full bg-gray-50 text-gray-300">
                <i class="fas fa-lock text-lg"></i>
            </div>
        </div>

        <!-- Gift 2 -->
        <div id="card-2" onclick="handleCardClick(2)" class="gift-card bg-white rounded-3xl p-5 shadow-xl border-b-[6px] border-pink-200 flex items-center gap-4 cursor-pointer relative overflow-hidden group">
            <div class="bg-yellow-100 p-3 rounded-full text-3xl float-anim shadow-inner" style="animation-delay: 0.5s;">🎁</div>
            <div class="flex-1">
                <h2 class="text-xl font-bold text-gray-700 group-hover:text-pink-500 transition-colors">ของขวัญชิ้นที่ 2</h2>
                <p class="text-xs text-gray-400 font-medium bg-gray-100 inline-block px-2 py-1 rounded-lg mt-1">20 กุมภาพันธ์</p>
            </div>
            <div id="status-icon-2" class="w-10 h-10 flex items-center justify-center rounded-full bg-gray-50 text-gray-300">
                <i class="fas fa-lock text-lg"></i>
            </div>
        </div>

        <!-- Gift 3 -->
        <div id="card-3" onclick="handleCardClick(3)" class="gift-card bg-white rounded-3xl p-5 shadow-xl border-b-[6px] border-pink-200 flex items-center gap-4 cursor-pointer relative overflow-hidden group">
            <div class="bg-blue-100 p-3 rounded-full text-3xl float-anim shadow-inner" style="animation-delay: 1s;">🎁</div>
            <div class="flex-1">
                <h2 class="text-xl font-bold text-gray-700 group-hover:text-pink-500 transition-colors">ของขวัญชิ้นที่ 3</h2>
                <p class="text-xs text-gray-400 font-medium bg-gray-100 inline-block px-2 py-1 rounded-lg mt-1">21 กุมภาพันธ์</p>
            </div>
            <div id="status-icon-3" class="w-10 h-10 flex items-center justify-center rounded-full bg-gray-50 text-gray-300">
                <i class="fas fa-lock text-lg"></i>
            </div>
        </div>
    </div>

    <!-- Countdown Section (Hidden initially) -->
    <div id="countdown-section" class="hidden-custom fixed bottom-0 left-0 w-full bg-white/95 backdrop-blur-md rounded-t-[2rem] p-6 shadow-[0_-5px_20px_rgba(0,0,0,0.1)] border-t-4 border-pink-300 z-20 transition-transform duration-500 transform translate-y-full">
        <div class="w-12 h-1.5 bg-gray-300 rounded-full mx-auto mb-4"></div>
        <h2 class="text-xl font-bold mb-3 text-pink-600 text-center flex items-center justify-center gap-2">
            <i class="fas fa-home animate-bounce"></i> เค้ากำลังเดินทางกลับนะะะะะะะะะะะะะะะ
        </h2>
        
        <div class="relative w-full h-8 bg-gray-200 rounded-full overflow-hidden mb-2 shadow-inner">
            <div id="progress-bar" class="absolute top-0 left-0 h-full bg-gradient-to-r from-pink-400 to-rose-500 transition-all duration-1000 flex items-center justify-end pr-2" style="width: 0%">
                <div class="w-full h-full absolute top-0 left-0 animate-shimmer"></div>
            </div>
        </div>
        
        <div class="flex justify-between items-end px-1">
            <span class="text-xs text-gray-400 font-medium">รอหน่อยน้า...</span>
            <span class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-red-600" id="percentage-text">0%</span>
            <span class="text-xs text-gray-400 font-medium">16:00 น.</span>
        </div>
    </div>

    <!-- Modal Popup -->
    <div id="modal" class="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4 hidden-custom opacity-0 transition-opacity duration-300 backdrop-blur-sm">
        <div id="modal-content" class="bg-white rounded-[2rem] p-6 max-w-sm w-full text-center shadow-2xl transform scale-90 transition-transform duration-300 relative border-4 border-pink-100 max-h-[90vh] overflow-y-auto">
            <button onclick="closeModal()" class="absolute top-3 right-3 w-8 h-8 bg-gray-100 rounded-full text-gray-400 hover:text-gray-600 flex items-center justify-center shadow-sm z-10">
                <i class="fas fa-times"></i>
            </button>
            
            <div id="modal-body" class="mt-4">
                <!-- Content inserted by JS -->
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-gray-800/95 text-white px-6 py-4 rounded-2xl shadow-2xl opacity-0 transition-opacity duration-300 pointer-events-none z-[60] text-sm text-center max-w-[80%]">
        <div class="text-2xl mb-2">👮‍♂️</div>
        <span id="toast-message">ข้อความแจ้งเตือน</span>
    </div>

    <script>
        // --- Configuration ---
        const currentYear = 2026; 
        
        // วันที่เป้าหมาย: กุมภาพันธ์ = 1
        const targetDates = {
            1: new Date(currentYear, 1, 19), 
            2: new Date(currentYear, 1, 20),
            3: new Date(currentYear, 1, 21) 
        };

        const returnTime = new Date(currentYear, 1, 21, 16, 0, 0); 

        // --- ข้อความล็อค ---
        const lockedMessages = [
            "เค้าฝึกอยู่นะเด็กอ้วงห้ามแอบเปิดนะะะะะ",
            "เด็กอ้วงเค้าฝึกก่อนนะะะ",
            "เด็กอ้วนรอเค้าฝึกก่อนนะะะะ",
            "เด็กอ้วงห้ามเปิดก่อนนะะ",
            "เด็กอ้วงรอเค้าก่อนนะะะเค้าฝึกอยู่่่"
        ];

        let currentOpenedDay = 0;

        // --- Secret Logic ---
        let secretClicks = 0;
        let isSecretMode = false;
        
        // จับเหตุการณ์กดที่รูปจดหมาย
        document.getElementById('secret-trigger').addEventListener('click', function() {
            secretClicks++;
            this.style.transform = 'scale(0.9)';
            setTimeout(() => this.style.transform = 'scale(1)', 100);

            if (secretClicks === 20) {
                isSecretMode = true;
                updateAllLocksVisual();
            }
        });

        // --- Main Logic ---

        function handleCardClick(day) {
            const now = new Date();
            const todayMidnight = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            const targetDate = targetDates[day];

            if (isSecretMode || todayMidnight >= targetDate || localStorage.getItem(`gift_${day}_opened`) === 'true') {
                openGift(day);
            } else {
                showLockedMessage(day);
            }
        }

        function showLockedMessage(day) {
            const msg = lockedMessages[Math.floor(Math.random() * lockedMessages.length)];
            
            const toast = document.getElementById('toast');
            document.getElementById('toast-message').innerText = msg;
            toast.style.opacity = '1';
            
            const card = document.getElementById(`card-${day}`);
            card.classList.add('shake');
            setTimeout(() => card.classList.remove('shake'), 500);

            setTimeout(() => toast.style.opacity = '0', 2500);
        }

        function openGift(day) {
            currentOpenedDay = day;
            
            localStorage.setItem(`gift_${day}_opened`, 'true');
            updateCardVisuals(day); 

            let htmlContent = '';

            if (day === 1) {
                htmlContent = `
                    <div class="text-6xl mb-4 animate-pulse">🌹</div>
                    <h2 class="text-2xl font-bold text-pink-600 mb-3">ดอกไม้ให้เด็กอ้วง!</h2>
                    <div class="bg-pink-50 p-5 rounded-2xl text-left text-gray-700 text-sm leading-relaxed border border-pink-100 shadow-sm font-medium">
                        "นี่เด็กอ้วงเค้ามีของขวัญวันนี้ให้คือดอกไม้้้ เด็กอ้วงคิดถึงเค้าม้ายย 
                        เค้ากำลังฝึกอยู่นะ เค้าคิดถึงเด็กอ้วงมักๆๆๆ เดี๋ยวเค้าก็จะกลับแย้ววววว"
                    </div>
                    <div class="mt-6 text-pink-400 text-xs flex justify-center items-center gap-1">
                        <i class="fas fa-heart"></i> รักนะค้าบบ
                    </div>
                `;
            } else if (day === 2) {
                htmlContent = `
                    <div class="text-6xl mb-4 animate-bounce">🍫</div>
                    <h2 class="text-2xl font-bold text-yellow-700 mb-3">ช็อกโกแลตตต!</h2>
                    <div class="bg-yellow-50 p-5 rounded-2xl text-left text-gray-700 text-sm leading-relaxed border border-yellow-100 shadow-sm font-medium">
                        "เค้ามีช็อกโกแลตให้้้ เดี๋ยวเค้ากลับบ้านเค้าจะซื้อช็อกโกแลตไปฝากเด็กอ้วงเยอะๆๆเยยยย"
                    </div>
                    <div class="mt-6 text-yellow-500 text-xs">กินเยอะๆ น้าา 🐷</div>
                `;
            } else if (day === 3) {
                // แก้ไข: ใช้ IMG tag ธรรมดา ไม่ใส่ Container ซับซ้อน เพื่อให้รูปไม่เด้งหาย
                htmlContent = `
                    <img src="https://media.giphy.com/media/Geimqs5VGr9h6/giphy.gif" class="w-full rounded-2xl mb-4 shadow-lg" alt="Dancing Cat">
                    <h2 class="text-2xl font-bold text-blue-600 mb-3">เซอร์ไพรส์!!</h2>
                    <div class="bg-blue-50 p-5 rounded-2xl text-left text-gray-700 text-sm leading-relaxed border border-blue-100 shadow-sm font-medium">
                        "วันนี้เค้าก็จะกลับแล้วนะเด็กอ้วงงงงง เค้าเหเหน่ยมักๆเค้าจะกลับไปกอดเด็กอ้วงเยยยย"
                    </div>
                `;
            }

            document.getElementById('modal-body').innerHTML = htmlContent;
            showModal();
        }

        // --- Visual Helpers ---
        function updateCardVisuals(day) {
            const card = document.getElementById(`card-${day}`);
            const iconContainer = document.getElementById(`status-icon-${day}`);
            
            card.classList.add('gift-opened');
            card.classList.remove('border-pink-200'); 
            
            iconContainer.innerHTML = '<i class="fas fa-check text-green-500 text-xl"></i>';
            iconContainer.classList.remove('text-gray-300', 'bg-gray-50');
            iconContainer.classList.add('bg-green-100', 'shadow-sm');
        }

        function updateAllLocksVisual() {
            const now = new Date();
            const todayMidnight = new Date(now.getFullYear(), now.getMonth(), now.getDate());

            for (let i = 1; i <= 3; i++) {
                const iconContainer = document.getElementById(`status-icon-${i}`);
                const isOpened = localStorage.getItem(`gift_${i}_opened`) === 'true';
                
                if (isOpened) {
                    updateCardVisuals(i);
                } else if (isSecretMode || todayMidnight >= targetDates[i]) {
                    iconContainer.innerHTML = '<i class="fas fa-lock-open text-pink-500 text-xl animate-pulse"></i>';
                    iconContainer.classList.add('bg-pink-50');
                }
            }
        }

        // --- Modal & Countdown ---
        const modal = document.getElementById('modal');
        const modalContent = document.getElementById('modal-content');
        const countdownSection = document.getElementById('countdown-section');

        function showModal() {
            modal.classList.remove('hidden-custom');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modalContent.classList.remove('scale-90');
            }, 10);
        }

        function closeModal() {
            modal.classList.add('opacity-0');
            modalContent.classList.add('scale-90');
            
            setTimeout(() => {
                modal.classList.add('hidden-custom');
                if (currentOpenedDay === 3) {
                    initCountdown();
                }
            }, 300);
        }

        function initCountdown() {
            countdownSection.classList.remove('hidden-custom');
            setTimeout(() => {
                countdownSection.classList.remove('translate-y-full');
            }, 50);
            
            updateCountdown();
            setInterval(updateCountdown, 1000);
        }

        function updateCountdown() {
            const now = new Date();
            const startTime = new Date(currentYear, 1, 21, 0, 0, 0); 
            const endTime = returnTime;

            const totalDuration = endTime - startTime;
            const currentProgress = now - startTime;
            
            let percent = (currentProgress / totalDuration) * 100;
            
            if (percent < 0) percent = 0;
            if (percent > 100) percent = 100;
            
            document.getElementById('progress-bar').style.width = `${percent}%`;
            document.getElementById('percentage-text').innerText = `${percent.toFixed(2)}%`;
            
            if (percent >= 100) {
                document.getElementById('percentage-text').innerText = "ถึงแล้ว! 🎉";
            }
        }

        // --- Initialize on Load ---
        window.onload = function() {
            updateAllLocksVisual();
            
            if (localStorage.getItem('gift_3_opened') === 'true') {
                initCountdown();
            }
        };
    </script>
</body>
</html>
