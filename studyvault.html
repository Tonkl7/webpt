<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyVault Pro - By Tonkla</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .cursor-copy { cursor: copy; }
        .font-handwriting { font-family: 'Courier New', Courier, monospace; }
        .code-scroll::-webkit-scrollbar { height: 8px; }
        .code-scroll::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
        .code-scroll::-webkit-scrollbar-track { background: #1f2937; }
        @keyframes blob {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0px, 0px) scale(1); }
        }
        .animate-blob { animation: blob 7s infinite; }
        .animation-delay-2000 { animation-delay: 2s; }
        .animation-delay-4000 { animation-delay: 4s; }
    </style>
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "lucide-react": "https://esm.sh/lucide-react@0.263.1"
        }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-900 overflow-hidden">
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef } from 'react';
        import ReactDOM from 'react-dom/client';
        import { 
            Folder, FileText, Code, Calendar, Clock, 
            Upload, Trash2, Grid, List, X, CheckSquare, 
            BookOpen, Plus, Move, Smartphone, 
            Monitor, Layout, Settings, File, Image as ImageIcon,
            Play, Pause, RefreshCw, ChevronRight, Home,
            Search, Music, PenTool, Eraser, StickyNote,
            PieChart, Activity, AlertCircle, Lock, LogIn, ExternalLink,
            ChevronLeft, Quote, Sun, Moon, Zap, Target
        } from 'lucide-react';

        // ✅ URL ล่าสุดของคุณ
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxXSEhb7x6k8d93X_NmIc-oENJ1iZhqd70tRg8ZsCR12o1ii8AT1ZbuTVFeKJlRNSUx/exec"; 

        const QUOTES = [
            "ความพยายามอยู่ที่ไหน ความสำเร็จอยู่ที่นั่น",
            "อย่าเพิ่งท้อ ถ้ายังไม่ได้ลงมือทำเต็มที่",
            "การเรียนรู้คือการลงทุนที่คุ้มค่าที่สุด",
            "เหนื่อยวันนี้ สบายวันหน้า",
            "วินัย คือสิ่งที่ทำให้เราทำในสิ่งที่ไม่อยากทำ เพื่อผลลัพธ์ที่อยากได้",
            "Believe you can and you're halfway there.",
            "โอกาสมักมาตอนที่เราเตรียมพร้อมเสมอ",
            "แข่งกับตัวเองในเมื่อวาน ให้เก่งขึ้นในวันนี้"
        ];

        function App() {
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [passwordInput, setPasswordInput] = useState('');
            const [loginError, setLoginError] = useState(false);
            const [isLoading, setIsLoading] = useState(false); 
            const [currentDate, setCurrentDate] = useState(new Date());
            const [activeTab, setActiveTab] = useState('dashboard');
            const [showCalendar, setShowCalendar] = useState(false);
            
            const [files, setFiles] = useState([]);
            const [exams, setExams] = useState([]);
            const [notes, setNotes] = useState([]);
            const [snippets, setSnippets] = useState([]);
            
            const [viewMode, setViewMode] = useState('grid');
            const [previewFile, setPreviewFile] = useState(null);
            const [searchTerm, setSearchTerm] = useState('');
            const [newExam, setNewExam] = useState({ subject: '', date: '', topic: '' });
            const [isDragging, setIsDragging] = useState(false);
            const [newCode, setNewCode] = useState({ title: '', language: 'javascript', code: '' });
            const [isAddingCode, setIsAddingCode] = useState(false);

            const [wbMode, setWbMode] = useState('move'); 
            const [isDrawing, setIsDrawing] = useState(false);
            const canvasRef = useRef(null);
            const [drawingData, setDrawingData] = useState(null);
            const [dragNoteId, setDragNoteId] = useState(null);
            const [dragOffset, setDragOffset] = useState({ x: 0, y: 0 });

            const [timer, setTimer] = useState(25 * 60);
            const [isRunning, setIsRunning] = useState(false);
            const [customTime, setCustomTime] = useState(''); 
            const [spotifyUrl, setSpotifyUrl] = useState("https://open.spotify.com/embed/playlist/0vvXsWCC9xrXsKd4FyS8kM?utm_source=generator");
            const [spotifyInput, setSpotifyInput] = useState('');

            useEffect(() => {
                const timer = setInterval(() => setCurrentDate(new Date()), 1000);
                return () => clearInterval(timer);
            }, []);

            // ✅ FIX: ปรับปรุงการโหลดข้อมูล (Load Data Logic)
            useEffect(() => {
                if (isLoggedIn && GOOGLE_SCRIPT_URL) {
                setIsLoading(true);
                fetch(`${GOOGLE_SCRIPT_URL}?action=getAll&_t=${new Date().getTime()}`)
                    .then(res => res.json())
                    .then(data => {
                    if(data.exams) {
                        const now = new Date();
                        const validExams = data.exams
                        .map(e => ({...e, completed: String(e.completed) === 'true'}))
                        .filter(e => {
                            if (e.completed) {
                                const examDate = new Date(e.date);
                                const oneDayAfter = new Date(examDate);
                                oneDayAfter.setDate(oneDayAfter.getDate() + 1);
                                if (now > oneDayAfter) {
                                    saveData('deleteExam', { id: e.id });
                                    return false;
                                }
                            }
                            return true;
                        });
                        setExams(validExams);
                    }
                    // ✅ รับข้อมูลไฟล์และแปลง ID เป็น string เพื่อความชัวร์
                    if(data.files && Array.isArray(data.files)) {
                        const loadedFiles = data.files.map(f => ({
                            ...f, 
                            id: String(f.id) // Ensure ID is string
                        }));
                        setFiles(loadedFiles);
                    }
                    if(data.snippets) setSnippets(data.snippets);
                    if(data.notes) setNotes(data.notes);
                    setIsLoading(false);
                    })
                    .catch(err => {
                        console.error("Error loading data:", err);
                        setIsLoading(false);
                    });
                }
            }, [isLoggedIn]);

            const saveData = (action, payload) => {
                if (!GOOGLE_SCRIPT_URL) return; 
                fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action, ...payload })
                }).catch(e => console.error("Save error:", e));
            };

            // ✅ FIX: ปรับปรุงการอัปโหลดไฟล์ (Upload Logic)
            const uploadFileObj = (file) => {
                setIsLoading(true);
                const reader = new FileReader();
                reader.onload = function(e) {
                    const base64Data = e.target.result.split(',')[1];
                    const generatedId = Date.now().toString(); // สร้าง ID ที่นี่เลย
                    
                    const payload = {
                        action: 'uploadFile',
                        id: generatedId, // ส่ง ID ไปให้ Server ใช้ด้วย
                        fileName: file.name,
                        mimeType: file.type,
                        fileData: base64Data,
                        size: (file.size / 1024 / 1024).toFixed(2) + ' MB',
                        category: getFileCategory(file.type)
                    };

                    // Optimistic update (แสดงผลทันที)
                    const tempFile = {
                        id: generatedId,
                        name: file.name,
                        type: file.type,
                        size: payload.size,
                        date: new Date().toLocaleDateString('th-TH'),
                        url: URL.createObjectURL(file),
                        category: payload.category,
                        isUploading: true
                    };
                    setFiles(prev => [...prev, tempFile]);

                    fetch(GOOGLE_SCRIPT_URL, {
                        method: 'POST',
                        body: JSON.stringify(payload)
                    })
                    .then(res => res.json())
                    .then(data => {
                        // อัปเดตสถานะเมื่อเสร็จสิ้น (ใช้ ID เดิม ไม่เปลี่ยน)
                        setFiles(prev => prev.map(f => f.id === generatedId ? { ...f, url: data.url, isUploading: false } : f)); 
                        setIsLoading(false);
                    })
                    .catch(err => {
                        console.error("Upload Error", err);
                        setFiles(prev => prev.filter(f => f.id !== generatedId)); // ลบออกถ้าพัง
                        setIsLoading(false);
                    });
                };
                reader.readAsDataURL(file);
            };

            const handleFileUpload = (event) => {
                const files = event.target.files;
                if (files && files.length > 0) Array.from(files).forEach(uploadFileObj);
            };

            const onDrop = (e) => {
                e.preventDefault();
                setIsDragging(false);
                const files = e.dataTransfer.files;
                if (files && files.length > 0) Array.from(files).forEach(uploadFileObj);
            };

            const deleteFile = (id, e) => {
                e.stopPropagation();
                if(confirm('ยืนยันการลบไฟล์นี้?')) {
                    setFiles(files.filter(f => f.id !== id));
                    saveData('deleteFile', { id }); 
                }
            };

            const handleLogin = (e) => {
                e.preventDefault();
                if (passwordInput === '25486') {
                    setIsLoggedIn(true);
                    setLoginError(false);
                } else {
                    setLoginError(true);
                }
            };

            const getFileCategory = (mimeType) => {
                if (mimeType.includes('image')) return 'image';
                if (mimeType.includes('pdf')) return 'pdf';
                if (mimeType.includes('video')) return 'video';
                if (mimeType.includes('audio')) return 'audio';
                return 'doc';
            };

            const filteredFiles = files.filter(f => f.name && f.name.toLowerCase().includes(searchTerm.toLowerCase()));

            const handleAddExam = () => {
                if(newExam.subject) {
                    const id = Date.now();
                    const examObj = { ...newExam, id, completed: false, priority: 'medium' };
                    setExams([...exams, examObj]);
                    saveData('addExam', examObj); 
                    setNewExam({ subject: '', date: '', topic: '' });
                }
            };

            const toggleExam = (id) => {
                setExams(exams.map(e => e.id === id ? {...e, completed: !e.completed} : e));
                saveData('toggleExam', { id }); 
            };

            const deleteExam = (id) => {
                if(confirm('ต้องการลบรายการสอบนี้ใช่ไหม?')) {
                    setExams(exams.filter(e => e.id !== id));
                    saveData('deleteExam', { id });
                }
            };

            const deleteSnippet = (id) => {
                if(confirm('ต้องการลบ Snippet นี้ใช่ไหม?')) {
                    setSnippets(snippets.filter(s => s.id !== id));
                    saveData('deleteSnippet', { id }); 
                }
            };

            const startDrawing = ({ nativeEvent }) => {
                if (wbMode !== 'draw') return;
                const { offsetX, offsetY } = nativeEvent;
                const ctx = canvasRef.current.getContext('2d');
                ctx.beginPath();
                ctx.moveTo(offsetX, offsetY);
                setIsDrawing(true);
            };
            const draw = ({ nativeEvent }) => {
                if (!isDrawing || wbMode !== 'draw') return;
                const { offsetX, offsetY } = nativeEvent;
                const ctx = canvasRef.current.getContext('2d');
                ctx.lineTo(offsetX, offsetY);
                ctx.strokeStyle = '#ef4444'; 
                ctx.lineWidth = 3;
                ctx.lineCap = 'round';
                ctx.stroke();
            };
            const stopDrawing = () => {
                if (wbMode === 'draw' && isDrawing) setDrawingData(canvasRef.current.toDataURL());
                setIsDrawing(false);
            };
            const handleGlobalMouseMove = (e) => {
                if (dragNoteId) {
                    const newX = e.clientX - dragOffset.x;
                    const newY = e.clientY - dragOffset.y;
                    setNotes(notes.map(n => n.id === dragNoteId ? { ...n, x: newX, y: newY } : n));
                }
            };
            
            const addNote = (e) => {
                if (wbMode === 'note') {
                    const rect = e.target.getBoundingClientRect();
                    const newNote = {
                        id: Date.now(),
                        x: e.clientX - rect.left - 100,
                        y: e.clientY - rect.top - 50,
                        text: 'New Note',
                        color: 'bg-yellow-200'
                    };
                    setNotes([...notes, newNote]);
                    setWbMode('move');
                    saveData('addNote', newNote);
                }
            };

            const deleteNote = (id, e) => {
                e.stopPropagation();
                if(confirm('ลบโน้ต?')) {
                    setNotes(notes.filter(n => n.id !== id));
                    saveData('deleteNote', { id });
                }
            }

            const updateNoteText = (id, text) => {
                setNotes(notes.map(n => n.id === id ? { ...n, text } : n));
            }
            
            const saveNoteText = (id, text) => {
                saveData('updateNote', { id, text });
            }

            const handleNoteDragEnd = () => {
                if (dragNoteId) {
                    const note = notes.find(n => n.id === dragNoteId);
                    if (note) {
                        saveData('updateNote', { id: note.id, x: note.x, y: note.y });
                    }
                    setDragNoteId(null);
                }
            }

            useEffect(() => {
                let interval = null;
                if (isRunning && timer > 0) {
                    interval = setInterval(() => setTimer(timer - 1), 1000);
                } else if (timer === 0) setIsRunning(false);
                return () => clearInterval(interval);
            }, [isRunning, timer]);

            const setCustomTimer = () => {
                const mins = parseInt(customTime);
                if (!isNaN(mins) && mins > 0) {
                    setTimer(mins * 60);
                    setCustomTime('');
                }
            };

            const updateSpotify = (input) => {
                let finalUrl = input;
                if (input.includes('spotify.com') && !input.includes('/embed/')) {
                    finalUrl = input.replace('spotify.com/', 'spotify.com/embed/');
                }
                setSpotifyUrl(finalUrl);
                setSpotifyInput('');
            };

            if (!isLoggedIn) {
                return (
                <div className="min-h-screen bg-slate-900 flex items-center justify-center p-4 font-sans relative overflow-hidden">
                    <div className="absolute top-0 left-0 w-full h-full overflow-hidden z-0">
                        <div className="absolute top-0 -left-4 w-72 h-72 bg-purple-300 rounded-full mix-blend-multiply filter blur-xl opacity-70 animate-blob"></div>
                        <div className="absolute top-0 -right-4 w-72 h-72 bg-yellow-300 rounded-full mix-blend-multiply filter blur-xl opacity-70 animate-blob animation-delay-2000"></div>
                        <div className="absolute -bottom-8 left-20 w-72 h-72 bg-pink-300 rounded-full mix-blend-multiply filter blur-xl opacity-70 animate-blob animation-delay-4000"></div>
                    </div>
                    <div className="bg-white/80 backdrop-blur-xl rounded-3xl p-8 w-full max-w-md shadow-2xl border border-white/50 z-10">
                        <div className="text-center mb-8">
                            <div className="w-20 h-20 bg-gradient-to-tr from-indigo-500 to-purple-500 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-lg shadow-indigo-500/30"><Lock className="text-white" size={40} /></div>
                            <h1 className="text-3xl font-extrabold text-slate-800">StudyVault Pro</h1>
                            <p className="text-slate-500 mt-2">กรุณายืนยันตัวตนเพื่อเข้าสู่ระบบ</p>
                        </div>
                        <form onSubmit={handleLogin} className="space-y-6">
                            <input type="password" value={passwordInput} onChange={(e) => setPasswordInput(e.target.value)} className="w-full bg-slate-50 border-2 border-slate-200 rounded-2xl px-6 py-4 outline-none focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 transition-all text-center text-xl tracking-[0.5em] font-bold text-slate-700 placeholder-slate-300" placeholder="•••••" autoFocus />
                            {loginError && <div className="text-red-500 text-sm text-center font-medium bg-red-50 py-2 rounded-lg animate-pulse">รหัสผ่านไม่ถูกต้อง</div>}
                            <button type="submit" className="w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-4 rounded-2xl shadow-xl shadow-slate-900/20 transition-all active:scale-95 flex items-center justify-center gap-3"><LogIn size={20} /> เข้าใช้งานระบบ</button>
                        </form>
                    </div>
                </div>
                );
            }

            const renderDashboard = () => {
                const pendingExams = exams.filter(e => !e.completed);
                const completedCount = exams.length - pendingExams.length;
                const progress = exams.length > 0 ? (completedCount / exams.length) * 100 : 0;
                const nextExam = pendingExams.sort((a,b) => new Date(a.date) - new Date(b.date))[0];
                const daysLeft = nextExam ? Math.ceil((new Date(nextExam.date) - new Date()) / (1000 * 60 * 60 * 24)) : 0;
                const quote = QUOTES[new Date().getDate() % QUOTES.length];

                return (
                <div className="flex-1 p-4 md:p-8 lg:p-12 bg-slate-50 h-full overflow-y-auto relative">
                    <div className="absolute top-0 right-0 w-[500px] h-[500px] bg-indigo-200/40 rounded-full blur-[100px] -translate-y-1/2 translate-x-1/2 pointer-events-none"></div>
                    <div className="absolute bottom-0 left-0 w-[400px] h-[400px] bg-pink-200/40 rounded-full blur-[100px] translate-y-1/2 -translate-x-1/2 pointer-events-none"></div>
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-end mb-10 relative z-10 gap-4">
                        <div>
                            <div className="text-sm font-bold text-indigo-500 uppercase tracking-wider mb-1">Welcome Back</div>
                            <h1 className="text-4xl md:text-5xl font-extrabold text-slate-900 tracking-tight">สวัสดี, <span className="text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-pink-600">ต้นกล้า</span></h1>
                            <p className="text-slate-500 mt-2 text-lg">{isLoading ? 'กำลังซิงค์ข้อมูล...' : 'วันนี้เราจะเรียนรู้อะไรใหม่ๆ กันดี?'}</p>
                        </div>
                        <div className="bg-white/60 backdrop-blur-md px-6 py-3 rounded-2xl border border-white/50 shadow-sm text-right">
                            <div className="text-3xl font-mono font-bold text-slate-800">{currentDate.toLocaleTimeString('th-TH', {hour: '2-digit', minute:'2-digit'})}</div>
                            <div className="text-sm font-medium text-slate-500 uppercase tracking-wide">{currentDate.toLocaleDateString('en-US', {weekday:'long', day:'numeric', month:'long'})}</div>
                        </div>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 relative z-10">
                        <div onClick={() => setShowCalendar(true)} className="lg:col-span-2 bg-gradient-to-br from-indigo-600 to-purple-700 rounded-[2rem] p-8 text-white shadow-2xl shadow-indigo-200 relative overflow-hidden group cursor-pointer transition-all hover:shadow-indigo-500/30 hover:scale-[1.01]">
                            <div className="absolute top-0 right-0 p-12 opacity-10 transform translate-x-8 -translate-y-8 group-hover:rotate-12 transition-transform duration-500"><Target size={180} /></div>
                            <div className="relative z-10 h-full flex flex-col justify-between">
                                <div>
                                    <div className="flex items-center gap-2 text-indigo-200 font-medium mb-2"><Zap size={18} className="text-yellow-400 fill-current" /> เป้าหมายถัดไป</div>
                                    {nextExam ? (<><div className="text-4xl md:text-5xl font-bold mb-4 leading-tight">{nextExam.subject}</div><div className="text-indigo-100 text-lg opacity-90">{nextExam.topic}</div></>) : (<div className="text-3xl font-bold py-4 text-indigo-100">ไม่มีการสอบเร็วๆ นี้ 🎉</div>)}
                                </div>
                                {nextExam && (<div className="mt-8 flex items-center gap-4"><div className="bg-white/20 backdrop-blur-md px-4 py-2 rounded-xl text-sm font-medium border border-white/10">{daysLeft} วันที่เหลือ</div><div className="text-sm opacity-70 group-hover:translate-x-1 transition-transform flex items-center gap-1">ดูปฏิทิน <ChevronRight size={16} /></div></div>)}
                            </div>
                        </div>
                        <div className="bg-white rounded-[2rem] p-6 shadow-lg shadow-slate-200/50 border border-slate-100 flex flex-col items-center justify-center relative overflow-hidden">
                            <h3 className="text-slate-500 font-medium text-sm absolute top-6 left-6">ความคืบหน้า</h3>
                            <div className="relative w-32 h-32 mt-4">
                                <svg className="w-full h-full -rotate-90" viewBox="0 0 36 36">
                                    <path className="text-slate-100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="currentColor" strokeWidth="3.5" />
                                    <path className="text-green-500 transition-all duration-1000 ease-out" strokeDasharray={`${Math.round(progress)}, 100`} d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="currentColor" strokeWidth="3.5" strokeLinecap="round" />
                                </svg>
                                <div className="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 text-center"><span className="text-3xl font-bold text-slate-800">{Math.round(progress)}%</span></div>
                            </div>
                            <div className="mt-4 text-xs font-medium text-green-600 bg-green-50 px-3 py-1 rounded-full">{completedCount} / {exams.length} วิชา</div>
                        </div>
                        <div className="bg-slate-900 rounded-[2rem] p-8 text-white shadow-xl flex flex-col justify-center relative overflow-hidden group">
                            <div className="absolute inset-0 bg-gradient-to-tr from-slate-900 via-slate-800 to-slate-900"></div>
                            <Quote size={64} className="absolute -top-4 -left-4 text-slate-700 opacity-50 transform rotate-180" />
                            <div className="relative z-10">
                                <p className="text-lg md:text-xl font-medium leading-relaxed font-serif italic text-slate-200">"{quote}"</p>
                                <div className="mt-6 w-12 h-1 bg-indigo-500 rounded-full group-hover:w-20 transition-all duration-500"></div>
                                <p className="text-xs text-slate-500 mt-2 uppercase tracking-widest">Daily Motivation</p>
                            </div>
                        </div>
                        <div className="md:col-span-2 lg:col-span-3 bg-white rounded-[2rem] p-8 shadow-lg shadow-slate-200/50 border border-slate-100">
                            <div className="flex justify-between items-center mb-6">
                                <h3 className="font-bold text-xl text-slate-800 flex items-center gap-3"><div className="bg-indigo-100 p-2 rounded-lg text-indigo-600"><CheckSquare size={20} /></div>รายการที่ต้องทำ</h3>

                    {[{id:'dashboard',label:'หน้าหลัก',icon:Home},{id:'whiteboard',label:'กระดานวางแผน',icon:PenTool},{id:'files',label:'คลังเอกสาร',icon:Folder},{id:'plan',label:'ตารางสอบ',icon:Calendar},{id:'code',label:'Code Snippets',icon:Code},{id:'tools',label:'เครื่องมือ & เพลง',icon:Music}].map(item=><button key={item.id} onClick={()=>setActiveTab(item.id)} className={`flex items-center gap-3 px-4 py-3 mx-1 md:mx-0 rounded-xl transition-all whitespace-nowrap text-sm font-medium ${activeTab===item.id?'bg-indigo-600 text-white shadow-lg shadow-indigo-900/50':'text-slate-400 hover:bg-slate-800 hover:text-white'}`}><item.icon size={18}/><span className="hidden md:inline">{item.label}</span></button>)}
                    </nav>
                    <div className="p-4 hidden md:block border-t border-slate-800"><button onClick={()=>setIsLoggedIn(false)} className="flex items-center gap-3 text-slate-400 hover:text-white text-sm w-full"><LogIn size={18} className="rotate-180"/> ออกจากระบบ</button></div>
                </div>
                <main className="flex-1 h-screen overflow-hidden flex flex-col relative bg-slate-50">
                    {activeTab === 'dashboard' && renderDashboard()}
                    {activeTab === 'whiteboard' && renderWhiteboard()}
                    {activeTab === 'files' && renderFileContent()}
                    {activeTab === 'plan' && renderPlanner()}
                    {activeTab === 'code' && renderCode()}
                    {activeTab === 'tools' && renderToolsWithSpotify()}
                </main>
                {previewFile && (
                    <div className="fixed inset-0 z-[100] bg-black/95 backdrop-blur-sm flex flex-col p-4 animate-in fade-in duration-200">
                    <div className="flex justify-between items-center text-white mb-4 px-2"><div><h3 className="text-lg font-medium">{previewFile.name}</h3><p className="text-xs text-slate-400">{previewFile.type} • {previewFile.size}</p></div><div className="flex gap-4"><a href={previewFile.url} download={previewFile.name} target="_blank" className="flex items-center gap-2 bg-indigo-600 hover:bg-indigo-700 px-4 py-2 rounded-lg text-sm transition-colors"><ExternalLink size={16}/> เปิดใน Drive</a><button onClick={()=>setPreviewFile(null)} className="p-2 bg-slate-800 hover:bg-slate-700 rounded-lg transition-colors"><X size={20}/></button></div></div>
                    <div className="flex-1 bg-slate-900 rounded-xl overflow-hidden flex items-center justify-center border border-slate-800 relative">
                        {previewFile.category === 'image' ? <img src={previewFile.url} className="max-w-full max-h-full object-contain" /> : <iframe src={previewFile.url.replace('/view', '/preview')} className="w-full h-full" title="Preview"></iframe>}
                    </div>
                    </div>
                )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
